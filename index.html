  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`, {

function fCOP(n) {
  if (!n && n !== 0) return "$0";
  return "$" + Math.round(n).toLocaleString("es-CO");
}

async function loadPdfJs() {
  if (window.pdfjsLib) return window.pdfjsLib;
  await new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  return window.pdfjsLib;
}

async function extractText(file) {
  // Si es imagen, retornar null para usar análisis visual directo
  if (file.type.startsWith("image/") || file.name.match(/\.(jpg|jpeg|png)$/i)) {
    return null; // señal para usar imagen directamente
  }
  const pdfjs = await loadPdfJs();
  const pdf = await pdfjs.getDocument({ data: await file.arrayBuffer() }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const content = await (await pdf.getPage(i)).getTextContent();
    text += content.items.map((x) => x.str).join(" ") + "\n";
  }
  return text;
}

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function limpiarTexto(t) {
  return t.replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F]/g, " ")
    .replace(/\\/g, "/").replace(/"/g, "'").replace(/\t/g, " ").substring(0, 6000);
}

function limpiarNum(n) {
  if (!n) return n;
  const bloques = String(n).match(/\d+/g) || [];
  return bloques.length ? bloques[bloques.length - 1] : n;
}

REGLA CRÍTICA PARA cantidad_por_conversion:

Sigue esta jerarquía estrictamente:

REGLA 1 — Columna explícita "CANT POR UNIDADES" o "UN/CAJA" en la factura (Coca-Cola, Pepsico, Bimbo):
  cantidad_por_conversion = valor de esa columna. Esta regla tiene prioridad sobre todo.

REGLA 2 — Asterisco seguido de número en el NOMBRE del producto (*N):
  Indica unidades por empaque SOLO si el número NO va seguido de una unidad de peso/volumen.
  - "*24" → conv=24 ✅ | "*6" → conv=6 ✅ | "*12" → conv=12 ✅
  - "*50 G", "*50G" → son gramos, conv=1 ❌ | "*625 ML", "*400M" → son mililitros, conv=1 ❌
  - "*90 GMS", "*40G", "*360 GMS" → son gramos, conv=1 ❌
  - Regla: si después del número hay G, GR, GMS, ML, KG, LT, CC → es peso/volumen, ignorar para conversión
  - EXCEPCIÓN: "LOS CUATES X269X24" → el X269 son ml y X24 es la referencia del sabor, conv=1
  - IMPORTANTE: El asterisco en columna POSICIÓN de Coca-Cola indica IVA, no conversión.

REGLA 3 — Unidad tipo P6, P12, P24 en la columna unidad:
  P6=6, P12=12, P24=24, P15=15.

REGLA 4 — Números entre paréntesis en el nombre como (48 DPLY),(24),(12):
  Son info del display del fabricante. NO son conversión. Ignorar siempre.

REGLA 5 — Por defecto: cantidad_por_conversion = 1

Ejemplos:
- "CERVEZA AGUILA *24" → conv=24
- "SNICKERS BARRA UNID(48 DPLY)" → conv=1 (paréntesis se ignora)
- "GALL TOSH MIEL*9(24)" → conv=9 (asterisco gana sobre paréntesis)
- Coca-Cola CJ con columna CANT POR UNIDADES=12 → conv=12 (columna gana sobre todo)

// Limpiar descripción de factura — quitar números internos de proveedores
function limpiarDescProveedor(desc, proveedor) {
  if (!desc) return '';
  let d = desc.trim().toUpperCase();
  // INSIFOOD: número largo pegado al texto + sufijo cantidad/precio
  d = d.replace(/^\d{5,}/, '').trim();
  d = d.replace(/\s+\d+[,\.]+\d*\s+(CJ|UN|PQT|BLS|BOT)\s+[\d,\.]+\s*$/i, '').trim();
  d = d.replace(/\s+\d+[,\.]+\d*\s+(CJ|UN|PQT|BLS|BOT)\s*$/i, '').trim();
  // ARA / LA FRESITA / LACTEOS ENVIGADO: "cantidad código NOMBRE"
  d = d.replace(/^\d+\s+\d{5,}\s+/, '').trim();
  // LACTEOS ENVIGADO: "cantidad código corto NOMBRE" + " X" al final
  d = d.replace(/^\d+\s+\d{2,5}\s+/, '').trim();
  d = d.replace(/\s+X\s*$/, '').trim();
  // CHIQUILLAS: "cantidad E-código NOMBRE"
  d = d.replace(/^\d+\s+[A-Z]?-?\d+\s+/, '').trim();
  // COCA COLA: "001 código NOMBRE 1 CJ"
  d = d.replace(/^\d{3}\s+\d{4,}\s+/, '').trim();
  d = d.replace(/\s+\d+\s+(CJ|BOT|UND|PQT)\s*$/i, '').trim();
  // Genérico: número largo al inicio
  d = d.replace(/^\d{5,}\s+/, '').trim();
  return d;
}

// Buscar producto en maestro por descripción (fuzzy matching)
function buscarEnMaestro(descFact, proveedor, nombreNormalizado) {
  // Priorizar nombre_normalizado si lo proveyó la IA
  const descLimpia = nombreNormalizado 
    ? nombreNormalizado.toUpperCase().trim()
    : limpiarDescProveedor(descFact, proveedor).toUpperCase();
  const desc = descLimpia;
  if (!desc || desc.length < 3) return null;
  
  // Normalizar: quitar espacios dobles, unificar mayúsculas
  const normalizar = s => s.toUpperCase().trim().replace(/\s+/g, ' ').replace(/([0-9]+)\s*(ml|g|gr|l|kg|cc)/gi, (_, n, u) => n + u.toLowerCase());

  const descNorm = normalizar(desc);

  // 1. Coincidencia exacta normalizada
  for (const p of MAESTRO_PRODUCTOS) {
    for (const alias of p.aliases) {
      if (normalizar(alias) === descNorm) return p;
    }
  }

  // 2. Contiene o está contenido
  for (const p of MAESTRO_PRODUCTOS) {
    for (const alias of p.aliases) {
      const a = normalizar(alias);
      if (descNorm.includes(a) || a.includes(descNorm)) return p;
    }
  }

  // 3. También buscar por planograma normalizado
  for (const p of MAESTRO_PRODUCTOS) {
    if (p.planograma && normalizar(p.planograma) === descNorm) return p;
    if (p.planograma && (descNorm.includes(normalizar(p.planograma)) || normalizar(p.planograma).includes(descNorm))) return p;
  }

  // 4. Fuzzy por palabras clave (>=60% en común)
  const palabrasDesc = descNorm.split(/\s+/).filter(w => w.length > 2);
  let mejorMatch = null;
  let mejorScore = 0;
  for (const p of MAESTRO_PRODUCTOS) {
    for (const alias of p.aliases) {
      const palabrasAlias = normalizar(alias).split(/\s+/).filter(w => w.length > 2);
      const comunes = palabrasDesc.filter(w => palabrasAlias.includes(w)).length;
      const score = comunes / Math.max(palabrasDesc.length, palabrasAlias.length);
      if (score > mejorScore && score >= 0.6) { mejorScore = score; mejorMatch = p; }
    }
  }
  return mejorMatch;
}

function normalizarProveedor(prov) {
  if (!prov) return prov;
  return PROVEEDOR_MAP[prov.trim()] || prov.trim();
}

// Verificar si un producto es un combo y expandirlo
function expandirCombo(desc, cantidad, subtotal) {
  const d = desc.toUpperCase();
  for (const combo of COMBOS) {
    if (d.includes(combo.patron.toUpperCase())) {
      const totalUnidades = combo.unidades_por_paquete ? cantidad * combo.unidades_por_paquete : cantidad;
      return combo.productos.map(p => ({
        descripcion: p.planograma,
        cod_barras: p.cod_barras || '',
        cantidad_factura: Math.round(totalUnidades * p.fraccion) || 1,
        valor_unitario_costo: Math.round((subtotal * p.fraccion) / (Math.round(totalUnidades * p.fraccion) || 1)),
        valor_total_linea: Math.round(subtotal * p.fraccion),
        cantidad_por_conversion: 1,
        unidad_conversion: 'Unidad',
        _es_combo: true
      }));
    }
  }
  return null;
}

// Enriquecer productos con datos del maestro
function enriquecerConMaestro(productos, proveedorRaw, addLog) {
  const proveedor = normalizarProveedor(proveedorRaw);
  const resultado = [];
  const pendientesNuevos = [];
  
  for (const prod of productos) {
    // Verificar si es combo
    const expandido = expandirCombo(prod.descripcion, prod.cantidad_factura || 1, prod.valor_total_linea || 0);
    if (expandido) {
      addLog(`→ 🔀 Combo expandido: "${prod.descripcion}" → ${expandido.length} productos`, "linf");
      resultado.push(...expandido);
      continue;
    }
    
    // Construir nombre completo: nombre_normalizado + presentacion
    if (prod.nombre_normalizado) {
      prod.nombre_completo = prod.presentacion 
        ? `${prod.nombre_normalizado} ${prod.presentacion}`.trim()
        : prod.nombre_normalizado;
    }
    // Buscar en maestro — usar nombre_completo si la IA lo extrajo
    const match = buscarEnMaestro(prod.descripcion, proveedor, prod.nombre_completo || prod.nombre_normalizado);
    if (match) {
      prod.cod_barras_touchpay = match.cod_barras;
      prod.planograma_touchpay = match.planograma;
      prod._mapeado = true;
      // Prioridad de conversión:
      // 1. La que ya viene en prod.cantidad_por_conversion (extraída por IA del asterisco)
      // 2. La unidad_medida P6/P12/P15 (para Mega Mayorista)
      // 3. La del maestro como fallback
      const convIA = prod.cantidad_por_conversion || 1;
      const um = (prod.unidad_medida || '').toUpperCase().trim();
      const convMap = {'P6':6,'P12':12,'P15':15,'P24':24,'P4':4,'P8':8,'P10':10,'P18':18,'P20':20};
      const convUM = convMap[um] || 0;
      const convFinal = convUM > 1 ? convUM : (convIA > 1 ? convIA : match.cant_conv);
      prod.cantidad_por_conversion = convFinal;
      prod.unidad_conversion = convFinal > 1 ? 'Caja' : match.unidad_conv;
    } else {
      prod._pendiente_mapeo = true;
      pendientesNuevos.push({ descripcion: prod.descripcion, proveedor });
      const nombreDisplay = prod.nombre_completo || prod.nombre_normalizado || prod.descripcion;
      addLog(`→ ⚠️ Sin mapear: "${nombreDisplay}" — agregar al maestro`, "lwarn");
    }
    resultado.push(prod);
  }
  
  // Guardar productos nuevos sin mapear
  if (pendientesNuevos.length > 0) {
    const sinMapear = load("as_sin_mapear", []);
    for (const p of pendientesNuevos) {
      if (!sinMapear.find(x => x.descripcion === p.descripcion && x.proveedor === p.proveedor)) {
        sinMapear.push({ ...p, fecha: new Date().toLocaleString("es-CO") });
      }
    }
    save("as_sin_mapear", sinMapear);
  }
  
  return resultado;
}

async function analizarConIA(texto, archivo, onLog, file=null, apiKey='') {
  let lastErr = null;
  for (let i = 1; i <= MAX_INTENTOS; i++) {
    try {
      if (i > 1) { onLog(`→ Reintento ${i}/${MAX_INTENTOS}...`, "warn"); await new Promise(r => setTimeout(r, 1500 * i)); }
      let p;
      if (texto === null && file) {
        // Es imagen — usar análisis visual
        onLog(`→ Analizando imagen con visión IA...`, "linf");
        const base64 = await fileToBase64(file);
        const mediaType = file.type || "image/jpeg";
        p = await llamarAPIImagen(base64, mediaType, apiKey);
      } else {
        p = await llamarAPI(limpiarTexto(texto), apiKey);
      }
      p.numero_factura = limpiarNum(p.numero_factura);
      p._inventario = INVENTARIO;
      p._clave_acceso = p.numero_factura;
      p._archivo = archivo;
      p._intentos = i;
      p._procesadoEl = new Date().toLocaleString("es-CO");
      return p;
    } catch (err) { lastErr = err; onLog(`→ Intento ${i} falló: ${err.message}`, "warn"); }
  }
  throw new Error(`${MAX_INTENTOS} intentos fallidos: ${lastErr.message}`);
}

function detectarDup(texto) {
  if (!texto) return null; // imágenes no pueden ser duplicadas por texto
  const procesados = load("as_procesados", {});
  for (const key of Object.keys(procesados)) {
    const num = key.split("_").slice(1).join("_");
    if (num && texto.includes(num)) return procesados[key];
  }
  return null;
}

}

          (p.desc_factura_original?.toUpperCase().includes(d))
        );
        if (resultado.productos?.some(_ignorarProducto)) {
          const ignorados = resultado.productos.filter(_ignorarProducto).map(p => p.descripcion || p.nombre_normalizado);
          ignorados.forEach(n => addLog(`⊘ Ignorado: "${n}" — descripción excluida`, "lwarn"));
          resultado.productos = resultado.productos.filter(p => !_ignorarProducto(p));
        }
        if (resultado.nit_proveedor && NITS_IGNORAR.includes(String(resultado.nit_proveedor).trim())) {
          addLog(`⊘ Ignorado: ${resultado.proveedor} — proveedor excluido (no requiere TouchPay)`, "lwarn");
          continue;
        }
        addLog(`→ ✓ ${resultado.productos?.length} producto(s) — ${resultado.proveedor}${resultado._intentos > 1 ? ` (intento ${resultado._intentos})` : ""}`, "lok");

        
        // Enriquecer con maestro de productos
        if (resultado.productos?.length > 0) {
          resultado.productos = enriquecerConMaestro(resultado.productos, resultado.proveedor, addLog);
          const mapeados = resultado.productos.filter(p => p._mapeado || p._es_combo).length;
          const sinMapear = resultado.productos.filter(p => p._pendiente_mapeo).length;
          addLog(`→ 📦 ${mapeados} mapeados en TouchPay${sinMapear > 0 ? ` · ⚠️ ${sinMapear} sin mapear` : ''}`, sinMapear > 0 ? "lwarn" : "lok");
        }
        setStep(3);

        registrarProcesado(resultado);

        // Quitar de pendientes
        const np = load("as_pendientes", []).filter(p => p.nombre !== file.name);
        save("as_pendientes", np); setPendientes(np);

        // Comparar costos con histórico y detectar alzas > 3%
        const costos_guardados = load("as_costos_productos", {});
        const alertas_precio = [];
        (resultado.productos || []).filter(p => p.cod_barras_touchpay && !p._pendiente_mapeo).forEach(p => {
          const ean = p.cod_barras_touchpay;
          const costo_nuevo = Math.round(p.valor_unitario_costo);
          const costo_anterior = costos_guardados[ean];
          if (costo_anterior && costo_nuevo > costo_anterior) {
            const variacion = ((costo_nuevo - costo_anterior) / costo_anterior) * 100;
            if (variacion > 3) {
              alertas_precio.push({
                ean, nombre: p.planograma_touchpay || p.nombre_normalizado || p.descripcion,
                costo_anterior, costo_nuevo,
                variacion: Math.round(variacion * 10) / 10
              });
            }
          }
          // Guardar/actualizar costo actual
          costos_guardados[ean] = costo_nuevo;
        });
        save("as_costos_productos", costos_guardados);
        // Sincronizar costos a Sheets (async, no bloqueante)
        if (window._gmailToken) {
          const costosRows = [["ean","costo"], ...Object.entries(costos_guardados).map(([k,v])=>[k,v])];
          sheetsClear(window._gmailToken, "Costos!A1:B").then(() => sheetsSet(window._gmailToken, "Costos!A1:B", costosRows)).catch(()=>{});
        }

        // Guardar en historial
        const hist = load("as_historial", []);
        hist.unshift({
          tipo: "ok", archivo: file.name, proveedor: resultado.proveedor,
          numero: resultado.numero_factura, fecha: resultado.fecha_emision,
          total: resultado.total_factura, productos: resultado.productos?.length,
          procesadoEl: resultado._procesadoEl, data: resultado,
          alertas_precio: alertas_precio.length > 0 ? alertas_precio : null
        });
        save("as_historial", hist.slice(0, 200));
        setHistorial(hist.slice(0, 200));
        if (alertas_precio.length > 0) {
          addLog(`📈 ${alertas_precio.length} producto(s) con aumento de costo >3% — revisar precios de venta`, "lwrn");
        }

        nuevos.push(resultado);
        addLog(`✓ Listo: ${file.name}`, "lok");
      } catch (err) {
        addLog(`✗ Error definitivo: ${err.message}`, "lerr");
        const pa = load("as_pendientes", []);
        if (!pa.find(p => p.nombre === file.name)) {
          const np = [...pa, { nombre: file.name, error: err.message, fecha: new Date().toLocaleString("es-CO") }];
          save("as_pendientes", np); setPendientes(np);
        }
        // Historial de error
        const hist = load("as_historial", []);
        hist.unshift({ tipo: "error", archivo: file.name, error: err.message, procesadoEl: new Date().toLocaleString("es-CO") });
        save("as_historial", hist.slice(0, 200));
        setHistorial(hist.slice(0, 200));

        nuevos.push({ _error: true, _archivo: file.name, _errMsg: err.message });
      }
    }

    setStep(4);
    const ok = nuevos.filter(r => !r._error && !r._duplicado).length;
    const err = nuevos.filter(r => r._error).length;
    const dup = nuevos.filter(r => r._duplicado).length;
    addLog(`✓ Terminado — ${ok} procesadas ✓  ${err} errores  ${dup} duplicadas`, "lok");
    setResults(nuevos);
    setProcessing(false);
  };

    });

  const generarScriptTP = (f, cantidadesReales, correcciones) => {
    // Calcular productos con unidades reales (igual que la tabla)
    const productos = (f.productos || []).filter(p => p.cod_barras_touchpay && !p._pendiente_mapeo);
    const productosSinMapear = (f.productos || []).filter(p => p._pendiente_mapeo);
    
    const lineas = productos.map((p, pi) => {
      const key = `${f.numero_factura}_${pi}`;
      const cantReal = cantidadesReales[key] !== undefined ? cantidadesReales[key] : p.cantidad_factura;
      const esCorreccion = correcciones[key] || false;
      const ajustado = cantReal !== p.cantidad_factura;
      const conv = p.cantidad_por_conversion || 1;
      const unidadesRecibidas = Math.round(cantReal * conv);
      const valorXUnidad = unidadesRecibidas > 0
        ? (esCorreccion && ajustado ? (cantReal * p.valor_unitario_costo) / unidadesRecibidas : p.valor_total_linea / unidadesRecibidas)
        : p.valor_unitario_costo;

      return {
        ean: p.cod_barras_touchpay,
        nombre: p.planograma_touchpay || p.descripcion,
        precio: Math.round(valorXUnidad),
        cantidad: unidadesRecibidas
      };
    });

    let fechaISO = "";

${lineas.map((p, i) => `— PRODUCTO ${i+1} de ${lineas.length} —

Proveedor: ${f.proveedor} | Factura: ${f.numero_factura} | ${lineas.length} productos`;

ain",borderRadius:"50%"}}/>

          <div className="pill"><div className="dot"/>En línea</div>
        </header>
        <div className="con">
          {/* Tabs */}
          <div className="tabs">
            <button className={`tab${tab==="procesar"?" active":""}`} onClick={()=>setTab("procesar")}>📄 Procesar Facturas</button>
            <button className={`tab${tab==="historial"?" active":""}`} onClick={()=>setTab("historial")}>📋 Historial {historial.length>0&&`(${historial.length})`}</button>
            <button className={`tab${tab==="gmail"?" active":""}`} onClick={()=>setTab("gmail")}>📧 Gmail</button>
          </div>

          {/* TAB PROCESAR */}
          {tab==="procesar" && <>
            <div className="sec-title">Procesar Facturas</div>
            <div className="sec-sub">// Carga los PDF → la IA extrae todo → listo para TouchPay</div>

            {pendientes.length>0&&(
              <div className="pend-box">
                <div className="pend-title">⚠ {pendientes.length} factura{pendientes.length>1?"s":""} pendiente{pendientes.length>1?"s":""} por procesar</div>
                {pendientes.map((p,i)=>(
                  <div key={i} className="pend-item">
                    <div>
                      <div style={{fontWeight:500}}>{p.nombre}</div>
                      <div style={{fontFamily:"DM Mono,monospace",fontSize:10,color:"#6b6b85"}}>Error: {p.error} · {p.fecha}</div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button className="btn-retry" onClick={()=>alert(`Selecciona "${p.nombre}" nuevamente en el área de carga y presiona Procesar`)}>↺ Reintentar</button>
                      <button className="btn-del" onClick={()=>elimPendiente(p.nombre)}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            <div className={`drop${dragOver?" over":""}`}
              onDragOver={e=>{e.preventDefault();setDragOver(true)}}
              onDragLeave={()=>setDragOver(false)}
              onDrop={e=>{e.preventDefault();setDragOver(false);handleFiles(e.dataTransfer.files)}}>
              <input type="file" accept=".pdf,.jpg,.jpeg,.png" multiple onChange={e=>handleFiles(e.target.files)}/>
              <div className="drop-icon">📄</div>
              <div className="drop-title">{files.length>0?`${files.length} factura${files.length>1?"s":""} seleccionada${files.length>1?"s":""}` :"Arrastra las facturas aquí"}</div>
              <div className="drop-sub">{files.length>0?files.map(f=>f.name).join(" · "):"o haz clic para seleccionar · PDF · JPG · PNG · múltiples archivos"}</div>
            </div>

            <button className="btn-main" disabled={!files.length||processing} onClick={procesar}>
              {processing?<><span className="spin"/>Procesando — hasta 3 intentos por factura...</>:`Procesar ${files.length||""} factura${files.length!==1?"s":""} con IA`}
            </button>

            {(processing||step>0)&&<>
              <div className="steps" style={{marginTop:18}}>
                {stepLabels.map((l,i)=>(
                  <div key={i} className={`step${step===i+1?" active":step>i+1?" done":""}`}>
                    <div className="snum">{step>i+1?"✓":i+1}</div>{l}
                  </div>
                ))}
              </div>
              <div className="logbox" ref={logRef}>
                {logs.map((l,i)=><div key={i} className={l.type}>[{l.t}] {l.msg}</div>)}
              </div>
            </>}

            {results.length>0&&<>
              <div className="res-hdr">
                <div className="res-title">Resultados</div>
                <div className="badge">{results.filter(r=>!r._error&&!r._duplicado).length} procesadas ✓</div>
              </div>

              {results.map((f,fi)=>{
                if(f._duplicado) return(
                  <div key={fi} className="dup-card">
                    <div style={{color:"#f5c842",fontWeight:600,marginBottom:3}}>⚠ Factura duplicada — no procesada</div>
                    <div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"#6b6b85"}}>{f._archivo}</div>
                    <div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"#6b6b85",marginTop:3}}>
                      Ya procesada: {f._dupInfo?.proveedor} · {f._dupInfo?.numero} · {f._dupInfo?.procesadoEl}
                    </div>
                  </div>
                );
                if(f._error) return(
                  <div key={fi} className="err-card">
                    <div style={{color:"#ff5566",fontWeight:600,marginBottom:3}}>✗ Error — guardada en pendientes</div>
                    <div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"#6b6b85"}}>{f._archivo}</div>
                    <div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"#6b6b85",marginTop:3}}>{f._errMsg}</div>
                  </div>
                );
                return(
                  <div key={fi} className="card">
                    <div className="card-hdr">
                      <div>
                        <div className="prov">{f.proveedor}</div>

                            const valorXUnidad = esCorreccion

            </div>
            {mapeoModal.prods.map((p,pi)=>(
              <div key={pi} style={{marginBottom:12,padding:"10px 14px",background:"var(--bg2)",borderRadius:8,border:"1.5px solid #ffc107"}}>
                <div style={{fontFamily:"Nunito,sans-serif",fontWeight:700,fontSize:13,marginBottom:6,color:"var(--text)"}}>
                  {p.nombre_completo||p.nombre_normalizado||p.descripcion}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"var(--muted)",whiteSpace:"nowrap"}}>EAN / Código de barras:</span>
                  <input
                    type="text" placeholder="Ej: 7702189045720"
                    value={mapeoEans[p.descripcion]||""}
                    onChange={e=>setMapeoEans(prev=>({...prev,[p.descripcion]:e.target.value}))}
                    style={{flex:1,fontFamily:"DM Mono,monospace",fontSize:12,padding:"5px 8px",borderRadius:6,border:"1.5px solid var(--border)",background:"var(--bg)",color:"var(--text)"}}
                  />
                </div>
              </div>
            ))}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
              <button className="bsm bout" onClick={()=>setMapeoModal(null)}>Cancelar</button>
              <button className="btn-main" style={{padding:"8px 20px",fontSize:13}} onClick={guardarMapeoYReprocesar}
                disabled={mapeoModal.prods.some(p=>!(mapeoEans[p.descripcion]?.trim()))}>
                ✓ Guardar y actualizar factura
              </button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL AUTOMATIZACIÓN TOUCHPAY */}
      {tpModal && (() => {
        const { script, lineas, productosSinMapear } = generarScriptTP(tpModal, cantidadesReales, correcciones);
        return (
          <div className="tp-modal" onClick={(e)=>{ if(e.target.className==="tp-modal") setTpModal(null); }}>
            <div className="tp-modal-box">
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:4}}>
                <div>
                  <div className="tp-modal-title">🤖 Automatizar en TouchPay</div>
                  <div className="tp-modal-sub">{tpModal.proveedor} · Factura {tpModal.numero_factura} · {lineas.length} productos mapeados</div>
                </div>
                <button onClick={()=>setTpModal(null)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--muted)",lineHeight:1}}>✕</button>
              </div>

              {productosSinMapear.length > 0 && (
                <div className="tp-warn">
                  ⚠️ <b>{productosSinMapear.length} producto(s) sin EAN</b> no se pueden automatizar: {productosSinMapear.map(p=>p.descripcion).join(", ")}. Agrégalos manualmente en TouchPay.
                </div>
              )}

              <ol className="tp-step-list">
                <li><div className="tp-step-num">1</div><div>Abre <b>touchpay.market</b> en Chrome y ve a <b>Compras</b>.</div></li>
                <li><div className="tp-step-num">2</div><div>Haz clic en el ícono de <b>Claude in Chrome</b> en la barra lateral del navegador para abrir el chat.</div></li>
                <li><div className="tp-step-num">3</div><div>Copia el script de abajo y pégalo en el chat de Claude. Él abre el formulario, llena todos los campos y agrega cada producto automáticamente.</div></li>
                <li><div className="tp-step-num">4</div><div>Supervisa el proceso — Claude te avisará si algún producto no se encuentra por EAN.</div></li>
              </ol>

              <div style={{fontFamily:"Nunito,sans-serif",fontWeight:700,fontSize:12,color:"var(--muted)",marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Script listo para Claude in Chrome:</div>
              <div className="tp-script-box">{script}</div>

              {/* Botón principal RUN */}
              <button className="btn-main" style={{width:"100%",marginBottom:10,fontSize:14,padding:"12px"}}
                onClick={()=>lanzarEnTouchPay(tpModal)}>
                🚀 Copiar script y abrir TouchPay
              </button>

              {scriptCopiado && (
                <div style={{padding:"12px 16px",background:"#e8f5e9",border:"1.5px solid #4caf50",borderRadius:10,marginBottom:10}}>
                  <div style={{fontFamily:"Nunito,sans-serif",fontWeight:800,fontSize:13,color:"#1a7f4b",marginBottom:6}}>
                    ✅ Script copiado — TouchPay abierto
                  </div>
                  <div style={{fontFamily:"DM Mono,monospace",fontSize:12,color:"var(--text)",lineHeight:1.6}}>
                    Ahora en la pestaña de TouchPay:<br/>
                    1. Haz clic en el ícono de <b>Claude</b> 🤖 en la barra del navegador<br/>
                    2. Escribe <b>/Ingresar-Factura-Pasha</b> y presiona Enter<br/>
                    3. El bot hace todo el resto solo ✓
                  </div>
                </div>
              )}

              <div className="tp-actions">
                <button className="bsm btp" onClick={()=>copiarScriptTP(tpModal)}>📋 Solo copiar script</button>
                <button className="bsm bdanger" onClick={()=>setTpModal(null)}>✕ Cerrar</button>
              </div>

              <div style={{marginTop:10,padding:"8px 14px",background:"var(--green-light)",borderRadius:8,fontSize:11,fontFamily:"DM Mono,monospace",color:"var(--green)"}}>
                ✓ Factura <b>{tpModal.numero_factura}</b> · {lineas.length} productos · inventario <b>{INVENTARIO}</b>
              </div>
            </div>
          </div>
        );
      })()}
    </>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
