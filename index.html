function fCOP(n) {
  if (!n && n !== 0) return "$0";
  return "$" + Math.round(n).toLocaleString("es-CO");
}

async function loadPdfJs() {
  if (window.pdfjsLib) return window.pdfjsLib;
  await new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  return window.pdfjsLib;
}

async function extractText(file) {
  // Si es imagen, retornar null para usar análisis visual directo
  if (file.type.startsWith("image/") || file.name.match(/\.(jpg|jpeg|png)$/i)) {
    return null; // señal para usar imagen directamente
  }
  const pdfjs = await loadPdfJs();
  const pdf = await pdfjs.getDocument({ data: await file.arrayBuffer() }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const content = await (await pdf.getPage(i)).getTextContent();
    text += content.items.map((x) => x.str).join(" ") + "\n";
  }
  return text;
}

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function limpiarTexto(t) {
  return t.replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F]/g, " ")
    .replace(/\\/g, "/").replace(/"/g, "'").replace(/\t/g, " ").substring(0, 6000);
}

function limpiarNum(n) {
  if (!n) return n;
  const bloques = String(n).match(/\d+/g) || [];
  return bloques.length ? bloques[bloques.length - 1] : n;
}

  const prompt = `Eres un experto analizando remisiones y facturas físicas de proveedores colombianos.

Analiza la imagen e identifica primero qué proveedor es, luego aplica las reglas correspondientes:

== PROVEEDOR COLANTA (remisión manual de lácteos) ==
- Los productos están IMPRESOS con nombre y presentación en g/ml (ej: "LECHE COLANTA 1000" donde 1000=ml, NO es precio)
- CANTIDAD y PRECIO están escritos A MANO en columnas separadas

- Solo incluir productos con valores escritos a mano — ignorar los sin escribir
- cantidad_por_conversion = 1 siempre
- NIT: 890900291

== PROVEEDOR AREPAS SARY (tiquete POS) ==
- Formato tiquete con columnas: Descripción, Cant, V.Unit, Subt, Iva, ISalud
- valor_unitario_costo = columna V.Unit directamente (ya incluye todo)
- cantidad_factura = columna Cant
- cantidad_por_conversion = 1 SIEMPRE (el "x N unds" es descripción del paquete, no conversión)
- valor_total_linea = columna Subt
- NIT: buscar en el tiquete
- numero_factura = número de remisión

== REGLAS GENERALES ==
- Responde ÚNICAMENTE con JSON válido, sin markdown
- valor_total_linea = valor_unitario_costo × cantidad_factura

JSON: {"proveedor":"...","nit_proveedor":"...","numero_factura":"...","fecha_emision":"DD/MM/YYYY","forma_pago":"CONTADO","total_factura":0,"productos":[{"descripcion":"...","nombre_normalizado":"...","presentacion":null,"codigo":null,"cantidad_factura":0,"unidad_medida":"UND","cantidad_por_conversion":1,"valor_unitario_costo":0,"valor_total_linea":0}]}`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 4500,
      messages: [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
          { type: "text", text: prompt }
        ]
      }]
    }),
  });
  if (!response.ok) { const e = await response.json(); throw new Error(e.error?.message || "Error API"); }
  const data = await response.json();
  const raw = data.content.map((c) => c.text || "").join("");
  const s = raw.indexOf("{"), e = raw.lastIndexOf("}");
  if (s === -1 || e === -1) throw new Error("Sin JSON válido");
  return JSON.parse(raw.substring(s, e + 1));
}

REGLA CRÍTICA PARA cantidad_por_conversion:

Sigue esta jerarquía estrictamente:

REGLA 1 — Columna explícita "CANT POR UNIDADES" o "UN/CAJA" en la factura (Coca-Cola, Pepsico, Bimbo):
  cantidad_por_conversion = valor de esa columna. Esta regla tiene prioridad sobre todo.

REGLA 2 — Asterisco seguido de número en el NOMBRE del producto (*N):
  Indica unidades por empaque SOLO si el número NO va seguido de una unidad de peso/volumen.
  - "*24" → conv=24 ✅ | "*6" → conv=6 ✅ | "*12" → conv=12 ✅
  - "*50 G", "*50G" → son gramos, conv=1 ❌ | "*625 ML", "*400M" → son mililitros, conv=1 ❌
  - "*90 GMS", "*40G", "*360 GMS" → son gramos, conv=1 ❌
  - Regla: si después del número hay G, GR, GMS, ML, KG, LT, CC → es peso/volumen, ignorar para conversión
  - IMPORTANTE: El asterisco en columna POSICIÓN de Coca-Cola indica IVA, no conversión.

REGLA 3 — Unidad tipo P6, P12, P24 en la columna unidad:
  P6=6, P12=12, P24=24, P15=15.

REGLA 4 — Números entre paréntesis en el nombre como (48 DPLY),(24),(12):
  Son info del display del fabricante. NO son conversión. Ignorar siempre.

REGLA 5 — Por defecto: cantidad_por_conversion = 1

Ejemplos:
- "CERVEZA AGUILA *24" → conv=24
- "SNICKERS BARRA UNID(48 DPLY)" → conv=1 (paréntesis se ignora)
- "GALL TOSH MIEL*9(24)" → conv=9 (asterisco gana sobre paréntesis)
- Coca-Cola CJ con columna CANT POR UNIDADES=12 → conv=12 (columna gana sobre todo)

// Limpiar descripción de factura — quitar números internos de proveedores
function limpiarDescProveedor(desc, proveedor) {
  if (!desc) return '';
  let d = desc.trim().toUpperCase();
  // INSIFOOD: número largo pegado al texto + sufijo cantidad/precio
  d = d.replace(/^\d{5,}/, '').trim();
  d = d.replace(/\s+\d+[,\.]+\d*\s+(CJ|UN|PQT|BLS|BOT)\s+[\d,\.]+\s*$/i, '').trim();
  d = d.replace(/\s+\d+[,\.]+\d*\s+(CJ|UN|PQT|BLS|BOT)\s*$/i, '').trim();
  // ARA / LA FRESITA / LACTEOS ENVIGADO: "cantidad código NOMBRE"
  d = d.replace(/^\d+\s+\d{5,}\s+/, '').trim();
  // LACTEOS ENVIGADO: "cantidad código corto NOMBRE" + " X" al final
  d = d.replace(/^\d+\s+\d{2,5}\s+/, '').trim();
  d = d.replace(/\s+X\s*$/, '').trim();
  // CHIQUILLAS: "cantidad E-código NOMBRE"
  d = d.replace(/^\d+\s+[A-Z]?-?\d+\s+/, '').trim();
  // COCA COLA: "001 código NOMBRE 1 CJ"
  d = d.replace(/^\d{3}\s+\d{4,}\s+/, '').trim();
  d = d.replace(/\s+\d+\s+(CJ|BOT|UND|PQT)\s*$/i, '').trim();
  // Genérico: número largo al inicio
  d = d.replace(/^\d{5,}\s+/, '').trim();
  return d;
}

// Buscar producto en maestro por descripción (fuzzy matching)
function buscarEnMaestro(descFact, proveedor, nombreNormalizado) {
  // Priorizar nombre_normalizado si lo proveyó la IA
  const descLimpia = nombreNormalizado 
    ? nombreNormalizado.toUpperCase().trim()
    : limpiarDescProveedor(descFact, proveedor).toUpperCase();
  const desc = descLimpia;
  if (!desc || desc.length < 3) return null;
  
  // Normalizar: quitar espacios dobles, unificar mayúsculas
  const normalizar = s => s.toUpperCase().trim().replace(/\s+/g, ' ').replace(/([0-9]+)\s*(ml|g|gr|l|kg|cc)/gi, (_, n, u) => n + u.toLowerCase());

  const descNorm = normalizar(desc);

  // 1. Coincidencia exacta normalizada
  for (const p of MAESTRO_PRODUCTOS) {
    for (const alias of p.aliases) {
      if (normalizar(alias) === descNorm) return p;
    }
  }

  // 2. Contiene o está contenido
  for (const p of MAESTRO_PRODUCTOS) {
    for (const alias of p.aliases) {
      const a = normalizar(alias);
      if (descNorm.includes(a) || a.includes(descNorm)) return p;
    }
  }

  // 3. También buscar por planograma normalizado
  for (const p of MAESTRO_PRODUCTOS) {
    if (p.planograma && normalizar(p.planograma) === descNorm) return p;
    if (p.planograma && (descNorm.includes(normalizar(p.planograma)) || normalizar(p.planograma).includes(descNorm))) return p;
  }

  // 4. Fuzzy por palabras clave (>=60% en común)
  const palabrasDesc = descNorm.split(/\s+/).filter(w => w.length > 2);
  let mejorMatch = null;
  let mejorScore = 0;
  for (const p of MAESTRO_PRODUCTOS) {
    for (const alias of p.aliases) {
      const palabrasAlias = normalizar(alias).split(/\s+/).filter(w => w.length > 2);
      const comunes = palabrasDesc.filter(w => palabrasAlias.includes(w)).length;
      const score = comunes / Math.max(palabrasDesc.length, palabrasAlias.length);
      if (score > mejorScore && score >= 0.6) { mejorScore = score; mejorMatch = p; }
    }
  }
  return mejorMatch;
}

  if (!prov) return prov;
  return PROVEEDOR_MAP[prov.trim()] || prov.trim();
}

// Verificar si un producto es un combo y expandirlo
function expandirCombo(desc, cantidad, subtotal) {
  const d = desc.toUpperCase();
  for (const combo of COMBOS) {
    if (d.includes(combo.patron.toUpperCase())) {
      return combo.productos.map(p => ({
        descripcion: p.planograma,
        cod_barras: p.cod_barras || '',
        cantidad_factura: Math.round(cantidad * p.fraccion) || 1,
        valor_unitario_costo: Math.round((subtotal * p.fraccion) / (Math.round(cantidad * p.fraccion) || 1)),
        valor_total_linea: Math.round(subtotal * p.fraccion),
        cantidad_por_conversion: 1,
        unidad_conversion: 'Unidad',
        _es_combo: true
      }));
    }
  }
  return null;
}

// Enriquecer productos con datos del maestro
function enriquecerConMaestro(productos, proveedorRaw, addLog) {
  const proveedor = normalizarProveedor(proveedorRaw);
  const resultado = [];
  const pendientesNuevos = [];
  
  for (const prod of productos) {
    // Verificar si es combo
    const expandido = expandirCombo(prod.descripcion, prod.cantidad_factura || 1, prod.valor_total_linea || 0);
    if (expandido) {
      addLog(`→ 🔀 Combo expandido: "${prod.descripcion}" → ${expandido.length} productos`, "linf");
      resultado.push(...expandido);
      continue;
    }
    
    // Construir nombre completo: nombre_normalizado + presentacion
    if (prod.nombre_normalizado) {
      prod.nombre_completo = prod.presentacion 
        ? `${prod.nombre_normalizado} ${prod.presentacion}`.trim()
        : prod.nombre_normalizado;
    }
    // Buscar en maestro — usar nombre_completo si la IA lo extrajo
    const match = buscarEnMaestro(prod.descripcion, proveedor, prod.nombre_completo || prod.nombre_normalizado);
    if (match) {
      prod.cod_barras_touchpay = match.cod_barras;
      prod.planograma_touchpay = match.planograma;
      prod._mapeado = true;
      // Calcular conversión: priorizar unidad_medida de la factura sobre el maestro
      const um = (prod.unidad_medida || '').toUpperCase().trim();
      const convMap = {'P6':6,'P12':12,'P15':15,'P24':24,'P4':4,'P8':8,'P10':10,'P18':18,'P20':20,'CJ':match.cant_conv,'UND':1};
      const convFact = convMap[um] !== undefined ? convMap[um] : (parseInt(um.replace('P','')) || match.cant_conv);
      prod.cantidad_por_conversion = convFact > 1 ? convFact : match.cant_conv;
      prod.unidad_conversion = convFact > 1 ? 'Caja' : match.unidad_conv;
      // Recalcular valor unitario si hay conversión
      if (convFact > 1 && prod.valor_unitario_costo) {
        prod.valor_unitario_costo = Math.round(prod.valor_unitario_costo / convFact);
      }
    } else {
      prod._pendiente_mapeo = true;
      pendientesNuevos.push({ descripcion: prod.descripcion, proveedor });
      const nombreDisplay = prod.nombre_completo || prod.nombre_normalizado || prod.descripcion;
      addLog(`→ ⚠️ Sin mapear: "${nombreDisplay}" — agregar al maestro`, "lwarn");
    }
    resultado.push(prod);
  }
  
  // Guardar productos nuevos sin mapear
  if (pendientesNuevos.length > 0) {
    const sinMapear = load("as_sin_mapear", []);
    for (const p of pendientesNuevos) {
      if (!sinMapear.find(x => x.descripcion === p.descripcion && x.proveedor === p.proveedor)) {
        sinMapear.push({ ...p, fecha: new Date().toLocaleString("es-CO") });
      }
    }
    save("as_sin_mapear", sinMapear);
  }
  
  return resultado;
}

async function analizarConIA(texto, archivo, onLog, file=null, apiKey='') {
  let lastErr = null;
  for (let i = 1; i <= MAX_INTENTOS; i++) {
    try {
      if (i > 1) { onLog(`→ Reintento ${i}/${MAX_INTENTOS}...`, "warn"); await new Promise(r => setTimeout(r, 1500 * i)); }
      let p;
      if (texto === null && file) {
        // Es imagen — usar análisis visual
        onLog(`→ Analizando imagen con visión IA...`, "linf");
        const base64 = await fileToBase64(file);
        const mediaType = file.type || "image/jpeg";
        p = await llamarAPIImagen(base64, mediaType, apiKey);
      } else {
        p = await llamarAPI(limpiarTexto(texto), apiKey);
      }
      p.numero_factura = limpiarNum(p.numero_factura);
      p._inventario = INVENTARIO;
      p._clave_acceso = p.numero_factura;
      p._archivo = archivo;
      p._intentos = i;
      p._procesadoEl = new Date().toLocaleString("es-CO");
      return p;
    } catch (err) { lastErr = err; onLog(`→ Intento ${i} falló: ${err.message}`, "warn"); }
  }
  throw new Error(`${MAX_INTENTOS} intentos fallidos: ${lastErr.message}`);
}

// Storage helpers

function detectarDup(texto) {
  if (!texto) return null; // imágenes no pueden ser duplicadas por texto
  const procesados = load("as_procesados", {});
  for (const key of Object.keys(procesados)) {
    const num = key.split("_").slice(1).join("_");
    if (num && texto.includes(num)) return procesados[key];
  }
  return null;
}

function registrarProcesado(f) {
  const todos = load("as_procesados", {});
  const key = `${f.nit_proveedor}_${f.numero_factura}`;
  todos[key] = { proveedor: f.proveedor, numero: f.numero_factura, fecha: f.fecha_emision, procesadoEl: f._procesadoEl };
  save("as_procesados", todos);
}

          const np = [...pa, { nombre: file.name, error: err.message, fecha: new Date().toLocaleString("es-CO") }];
          save("as_pendientes", np); setPendientes(np);
        }
        // Historial de error
        const hist = load("as_historial", []);
        hist.unshift({ tipo: "error", archivo: file.name, error: err.message, procesadoEl: new Date().toLocaleString("es-CO") });
        save("as_historial", hist.slice(0, 200));
        setHistorial(hist.slice(0, 200));

        nuevos.push({ _error: true, _archivo: file.name, _errMsg: err.message });
      }
    }

    setStep(4);
    const ok = nuevos.filter(r => !r._error && !r._duplicado).length;
    const err = nuevos.filter(r => r._error).length;
    const dup = nuevos.filter(r => r._duplicado).length;
    addLog(`✓ Terminado — ${ok} procesadas ✓  ${err} errores  ${dup} duplicadas`, "lok");
    setResults(nuevos);
    setProcessing(false);
  };

  const elimPendiente = (nombre) => {
    const np = pendientes.filter(p => p.nombre !== nombre);
    save("as_pendientes", np); setPendientes(np);
  };

  const [confirmBorrar, setConfirmBorrar] = useState(false);
  const borrarHistorial = () => {
    if (!confirmBorrar) { setConfirmBorrar(true); return; }
    localStorage.removeItem("as_historial");
    localStorage.removeItem("as_procesados");
    localStorage.removeItem("as_pendientes");
    setHistorial([]); setPendientes([]); setResults([]); setLogs([]); setStep(0); setConfirmBorrar(false);
  };

  const borrarUno = (numero, nit) => {
    const procesados = load("as_procesados", {});
    delete procesados[`${nit}_${numero}`];
    save("as_procesados", procesados);
    const hist = historial.filter(h => h.numero !== numero);
    save("as_historial", hist); setHistorial(hist);
  };

  const descargarCSV = (f) => {
    const rows = [
      ["Proveedor","Factura","Fecha","Descripcion","Codigo","Cantidad","Unidad","Cant_Conv","Valor_Unit","Valor_Total"],
      ...(f.productos||[]).map(p => [f.proveedor,f.numero_factura,f.fecha_emision,`"${p.descripcion}"`,p.codigo||"",p.cantidad_factura,p.unidad_medida,p.cantidad_por_conversion,p.valor_unitario_costo,p.valor_total_linea])
    ];
    const csv = rows.map(r => r.join(",")).join("\n");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8"}));
    a.download = `${f.numero_factura}_alwaysmart.csv`; a.click();
  };

  const copiarTP = (f) => {
    let g = `=== TOUCHPAY: ${f.proveedor} ===\n\nPANEL 1:\n`;
    g += `  Número de factura: ${f.numero_factura}\n  Clave de acceso:   ${f.numero_factura}\n`;
    g += `  Fecha de emisión:  ${f.fecha_emision}\n  Inventario:        ${INVENTARIO}\n\nPANEL 2 — ${f.productos?.length} PRODUCTOS:\n`;
    (f.productos||[]).forEach((p,i) => {
      g += `\n  [${i+1}/${f.productos.length}] ${p.descripcion}\n`;
      g += `  Valor en $:       ${Math.round(p.valor_unitario_costo)}\n`;
      g += `  Unidad:           ${p.unidad_medida}\n`;
      g += `  Cant. conversión: ${p.cantidad_por_conversion}\n`;
    });
    navigator.clipboard.writeText(g);
    alert(`✓ Guía de ${f.productos?.length} productos copiada`);
  };

  const stepLabels = ["Leyendo PDFs","Analizando con IA","Estructurando","Listo"];
  // Guardar API key
  const guardarApiKey = () => {
    const k = apiKeyInput.trim();
    if (!k.startsWith("sk-ant-")) { alert("La API key debe empezar con sk-ant-"); return; }
    save("as_api_key", k);
    setApiKey(k);
    setApiKeyInput("");
  };

  const histOk = historial.filter(h => h.tipo === "ok").length;
  const histErr = historial.filter(h => h.tipo === "error").length;
  const histDup = historial.filter(h => h.tipo === "duplicado").length;

  // Si no hay API key, mostrar pantalla de configuración
  if (!apiKey) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>

          <div>
            <div style={{fontFamily:"Nunito,sans-serif",fontWeight:900,fontSize:20,color:"var(--text)"}}>ALWAYSMART · INVERSIONES PASHA</div>
            <div style={{fontSize:11,color:"var(--muted)"}}>Asistente de Compras</div>
          </div>
        </div>
        <div style={{fontFamily:"Nunito,sans-serif",fontWeight:700,fontSize:16,marginBottom:8}}>Configuración inicial</div>
        <div style={{fontSize:13,color:"var(--muted)",marginBottom:20}}>Ingresa tu API key de Anthropic para activar el procesamiento de facturas con IA.</div>
        <input
          type="password"
          placeholder="sk-ant-api03-..."
          value={apiKeyInput}
          onChange={e=>setApiKeyInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&guardarApiKey()}
          style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1.5px solid var(--border)",fontSize:13,fontFamily:"DM Mono,monospace",boxSizing:"border-box",marginBottom:12}}
        />

          La API key se guarda solo en tu navegador, nunca se sube a ningún servidor.
        </div>

ain",borderRadius:"50%"}}/>

          <div className="pill"><div className="dot"/>En línea</div>
        </header>
        <div className="con">
          {/* Tabs */}
          <div className="tabs">
            <button className={`tab${tab==="procesar"?" active":""}`} onClick={()=>setTab("procesar")}>📄 Procesar Facturas</button>
            <button className={`tab${tab==="historial"?" active":""}`} onClick={()=>setTab("historial")}>📋 Historial {historial.length>0&&`(${historial.length})`}</button>
            <button className={`tab${tab==="gmail"?" active":""}`} onClick={()=>setTab("gmail")}>📧 Gmail</button>
          </div>

          {/* TAB PROCESAR */}
          {tab==="procesar" && <>
            <div className="sec-title">Procesar Facturas</div>
            <div className="sec-sub">// Carga los PDF → la IA extrae todo → listo para TouchPay</div>

            {pendientes.length>0&&(
              <div className="pend-box">
                <div className="pend-title">⚠ {pendientes.length} factura{pendientes.length>1?"s":""} pendiente{pendientes.length>1?"s":""} por procesar</div>
                {pendientes.map((p,i)=>(
                  <div key={i} className="pend-item">
                    <div>
                      <div style={{fontWeight:500}}>{p.nombre}</div>
                      <div style={{fontFamily:"DM Mono,monospace",fontSize:10,color:"#6b6b85"}}>Error: {p.error} · {p.fecha}</div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button className="btn-retry" onClick={()=>alert(`Selecciona "${p.nombre}" nuevamente en el área de carga y presiona Procesar`)}>↺ Reintentar</button>
                      <button className="btn-del" onClick={()=>elimPendiente(p.nombre)}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            <div className={`drop${dragOver?" over":""}`}
              onDragOver={e=>{e.preventDefault();setDragOver(true)}}
              onDragLeave={()=>setDragOver(false)}
              onDrop={e=>{e.preventDefault();setDragOver(false);handleFiles(e.dataTransfer.files)}}>
              <input type="file" accept=".pdf,.jpg,.jpeg,.png" multiple onChange={e=>handleFiles(e.target.files)}/>
              <div className="drop-icon">📄</div>
              <div className="drop-title">{files.length>0?`${files.length} factura${files.length>1?"s":""} seleccionada${files.length>1?"s":""}` :"Arrastra las facturas aquí"}</div>
              <div className="drop-sub">{files.length>0?files.map(f=>f.name).join(" · "):"o haz clic para seleccionar · PDF · JPG · PNG · múltiples archivos"}</div>
            </div>

            <button className="btn-main" disabled={!files.length||processing} onClick={procesar}>
              {processing?<><span className="spin"/>Procesando — hasta 3 intentos por factura...</>:`Procesar ${files.length||""} factura${files.length!==1?"s":""} con IA`}
            </button>

            {(processing||step>0)&&<>
              <div className="steps" style={{marginTop:18}}>
                {stepLabels.map((l,i)=>(
                  <div key={i} className={`step${step===i+1?" active":step>i+1?" done":""}`}>
                    <div className="snum">{step>i+1?"✓":i+1}</div>{l}
                  </div>
                ))}
              </div>
              <div className="logbox" ref={logRef}>
                {logs.map((l,i)=><div key={i} className={l.type}>[{l.t}] {l.msg}</div>)}
              </div>
            </>}

            {results.length>0&&<>
              <div className="res-hdr">
                <div className="res-title">Resultados</div>
                <div className="badge">{results.filter(r=>!r._error&&!r._duplicado).length} procesadas ✓</div>
              </div>

              {results.map((f,fi)=>{
                if(f._duplicado) return(
                  <div key={fi} className="dup-card">
                    <div style={{color:"#f5c842",fontWeight:600,marginBottom:3}}>⚠ Factura duplicada — no procesada</div>
                    <div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"#6b6b85"}}>{f._archivo}</div>
                    <div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"#6b6b85",marginTop:3}}>
                      Ya procesada: {f._dupInfo?.proveedor} · {f._dupInfo?.numero} · {f._dupInfo?.procesadoEl}
                    </div>
                  </div>
                );
                if(f._error) return(
                  <div key={fi} className="err-card">
                    <div style={{color:"#ff5566",fontWeight:600,marginBottom:3}}>✗ Error — guardada en pendientes</div>
                    <div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"#6b6b85"}}>{f._archivo}</div>
                    <div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"#6b6b85",marginTop:3}}>{f._errMsg}</div>
                  </div>
                );
                return(
                  <div key={fi} className="card">
                    <div className="card-hdr">
                      <div>
                        <div className="prov">{f.proveedor}</div>
                        <div className="provmeta">NIT: {f.nit_proveedor} · {f._archivo} · Procesada: {f._procesadoEl}</div>
                      </div>
                      <div className="metas">
                        <div className="meta">Factura <b>{f.numero_factura}</b></div>
                        <div className="meta">Fecha <b>{f.fecha_emision}</b></div>
                        <div className="meta">Pago <b>{f.forma_pago}</b></div>
                        <div className="meta">Inventario <b style={{color:"#00e5a0"}}>{INVENTARIO}</b></div>
                        {f._intentos>1&&<div className="intento">⚡ intento {f._intentos}</div>}
                      </div>
                    </div>
                    <div className="tw">
                      <table>
                        <thead>
                          <tr>
                            <th>#</th>
                            <th>Producto</th>
                            <th>Código</th>
                            <th>Cantidad</th>
                            <th style={{color:"var(--orange)"}}>Cant. real recibida</th>
                            <th>Unidad empaque</th>
                            <th>Cant/conv.</th>
                            <th style={{color:"var(--green)"}}>Unidades recibidas</th>
                            <th style={{color:"var(--green)"}}>Valor x unidad</th>
                            <th>Valor total</th>
                          </tr>
                        </thead>
                        <tbody>
                          {(f.productos||[]).map((p,pi)=>{
                            const key = fi+"_"+pi;
                            const cantReal = cantidadesReales[key] !== undefined ? cantidadesReales[key] : p.cantidad_factura;
                            const ajustado = cantReal !== p.cantidad_factura && cantReal > 0;
                            const esCorreccion = correcciones[key] || false;

                            // Unidades totales recibidas = cantidad × conversion
                            const unidadesRecibidas = Math.round(cantReal * p.cantidad_por_conversion * 100) / 100;

                            // Valor por unidad:
                            // - Si es corrección → mantener valor unitario original (el precio no cambia)
                            // - Si es promo → recalcular (más unidades por el mismo precio total)
                            const valorXUnidad = esCorreccion
                              ? p.valor_unitario_costo
                              : (unidadesRecibidas > 0 ? p.valor_total_linea / unidadesRecibidas : p.valor_unitario_costo);

                            return (
                              <tr key={pi} style={ajustado ? {background:"#fffbeb"} : {}}>
                                <td className="tmono" style={{color:"var(--muted)"}}>{pi+1}</td>
                                <td style={{maxWidth:200,fontWeight:600}}>{p.descripcion}</td>
                                <td className="tmono" style={{color:"var(--muted)"}}>{p.codigo||"—"}</td>
                                <td className="tmono" style={{textAlign:"center",color:"var(--muted)"}}>{p.cantidad_factura}</td>
                                <td style={{textAlign:"center"}}>
                                  <input
                                    type="number" min="1"
                                    value={cantReal}
                                    onChange={e=>{
                                      const v = parseFloat(e.target.value)||p.cantidad_factura;
                                      setCantidadesReales(prev=>({...prev,[key]:v}));
                                    }}
                                    style={{
                                      width:60, padding:"4px 6px",
                                      border:"1.5px solid "+(ajustado?(esCorreccion?"var(--green)":"var(--orange)"):"var(--border)"),
                                      borderRadius:6, fontFamily:"DM Mono,monospace", fontSize:12,
                                      textAlign:"center",
                                      background: ajustado?(esCorreccion?"#f0fff4":"#fff8f0"):"var(--surface)",
                                      color: ajustado?(esCorreccion?"var(--green)":"var(--orange)"):"var(--text)",
                                      fontWeight: ajustado?700:400, outline:"none"
                                    }}
                                  />
                                  {ajustado&&<div style={{display:"flex",alignItems:"center",gap:4,marginTop:3,justifyContent:"center"}}>
                                    <input
                                      type="checkbox"
                                      checked={esCorreccion}
                                      onChange={e=>setCorrecciones(prev=>({...prev,[key]:e.target.checked}))}
                                      style={{cursor:"pointer",width:12,height:12}}
                                    />
                                    <span style={{fontSize:9,fontFamily:"DM Mono,monospace",color:esCorreccion?"var(--green)":"var(--orange)"}}>
                                      {esCorreccion?"✓ corrección":"⚡ promo"}
                                    </span>
                                  </div>}
                                </td>
                                <td><span className="tunit">{p.unidad_medida}</span></td>
                                <td className="tmono" style={{textAlign:"center"}}>{p.cantidad_por_conversion}</td>
                                <td className="tmono" style={{textAlign:"center",fontWeight:700,color:"var(--green)"}}>
                                  {unidadesRecibidas}
                                </td>
                                <td>
                                  <span style={{fontFamily:"DM Mono,monospace",fontSize:12,fontWeight:700,color:"var(--green)"}}>{fCOP(valorXUnidad)}</span>
                                  {ajustado&&<div style={{fontSize:9,fontFamily:"DM Mono,monospace",color:"var(--muted)",textDecoration:"line-through"}}>{fCOP(p.valor_total_linea/unidadesRecibidas)}</div>}
                                </td>
                                <td className="tmono">
                                  {fCOP(esCorreccion && ajustado ? cantReal * p.valor_unitario_costo : p.valor_total_linea)}
                                  {esCorreccion && ajustado && <div style={{fontSize:9,fontFamily:"DM Mono,monospace",color:"var(--muted)",textDecoration:"line-through"}}>{fCOP(p.valor_total_linea)}</div>}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                    <div className="tp-sec">
                      <div className="tp-title">▶ Datos listos para TouchPay</div>
                      <div className="tp-grid">
                        {[{l:"Número de la factura",v:f.numero_factura},{l:"Clave de acceso (NFe)",v:f.numero_factura},{l:"Fecha de emisión",v:f.fecha_emision},{l:"Inventario",v:INVENTARIO,g:true}].map(x=>(
                          <div key={x.l} className="tp-field">
                            <div className="tp-label">{x.l}</div>
                            <div className="tp-val" style={x.g?{color:"#00e5a0"}:{}}>{x.v}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div className="card-foot">
                      <div className="tot">Productos <b>{f.productos?.length}</b></div>
                      <div className="tot main">Total <b>{fCOP(f.total_factura)}</b></div>
                    </div>
                    <div className="card-act">
                      <button className="bsm bout" onClick={()=>descargarCSV(f)}>⬇ Descargar Excel</button>
                      <button className="bsm bacc" onClick={()=>copiarTP(f,fi)}>📋 Copiar para TouchPay</button>
                      <button className="bsm bdanger" onClick={()=>borrarUno(f.numero_factura,f.nit_proveedor)}>🗑 Borrar registro</button>
                    </div>
                  </div>
                );
              })}
            </>}
          </>}

          {tab==="gmail"&&<>
            <div className="sec-title">Importar desde Gmail</div>
            <div className="sec-sub">// Conecta tu correo para descargar facturas ZIP automáticamente</div>
            {!gmailToken ? (
              <div style={{textAlign:"center",padding:"40px 20px"}}>
                <div style={{fontSize:48,marginBottom:12}}>📧</div>
                <div style={{fontFamily:"Nunito,sans-serif",fontWeight:800,fontSize:18,marginBottom:8,color:"var(--text)"}}>Conectar Gmail</div>
                <div style={{fontFamily:"DM Mono,monospace",fontSize:12,color:"var(--muted)",marginBottom:24}}>
                  Autoriza el acceso para descargar facturas ZIP automáticamente
                </div>
                <button className="btn-main" style={{maxWidth:300,margin:"0 auto"}} onClick={conectarGmail} disabled={gmailLoading}>
                  {gmailLoading ? <><span className="spin"/>Conectando...</> : "📧 Conectar con Gmail"}
                </button>
              </div>
            ) : (
              <div>
                <div style={{background:"var(--green-light)",border:"1.5px solid #c8e6d0",borderRadius:12,padding:"14px 18px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{fontFamily:"Nunito,sans-serif",fontWeight:800,color:"var(--green)"}}>✓ Gmail conectado — inversionespasha@gmail.com</div>
                    <div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"var(--muted)",marginTop:2}}>
                      {gmailCorreos.length} correos nuevos con ZIP encontrados
                      {ultimoProcesamiento && <span> · Último procesamiento: {new Date(ultimoProcesamiento).toLocaleString("es-CO")}</span>}
                      {!ultimoProcesamiento && <span> · Primera conexión — buscando todos los correos</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button className="bsm bacc" onClick={procesarDesdeGmail} disabled={gmailProcesando}>
                      {gmailProcesando ? <><span className="spin"/>Descargando...</> : `⬇ Descargar ${gmailCorreos.length} facturas nuevas`}
                    </button>
                    <button className="bsm bout" onClick={()=>{save("as_gmail_token",null);save("as_ultimo_gmail",null);setGmailToken(null);setUltimoProcesamiento(null);setGmailCorreos([]);}}>
                      🔌 Desconectar
                    </button>
                  </div>
                </div>
                <div className="logbox" ref={logRef}>
                  {logs.map((l,i)=><div key={i} className={l.type}>[{l.t}] {l.msg}</div>)}
                </div>
              </div>
            )}
          </>}

          {/* TAB HISTORIAL */}
          {tab==="historial"&&<>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <div>
                <div className="sec-title">Historial</div>
                <div className="sec-sub">// Todas las facturas procesadas en esta sesión</div>
              </div>
              {historial.length>0&&<button className={`btn-sm-outline${confirmBorrar?" bdanger":""}`} onClick={borrarHistorial}>{confirmBorrar?"⚠ Confirmar — clic de nuevo para borrar":"🗑 Borrar todo y reiniciar"}</button>}
            </div>

            {historial.length>0&&(
              <div className="stats-row">
                <div className="stat"><div className="stat-num">{histOk}</div><div className="stat-label">Procesadas correctamente</div></div>
                <div className="stat"><div className="stat-num" style={{color:"#f5c842"}}>{histDup}</div><div className="stat-label">Duplicadas bloqueadas</div></div>
                <div className="stat"><div className="stat-num" style={{color:"#ff5566"}}>{histErr}</div><div className="stat-label">Con error</div></div>
              </div>
            )}

            {historial.length===0?(
              <div className="empty">
                <div className="empty-icon">📋</div>
                <div>Aún no hay facturas procesadas</div>
              </div>
            ):(
              historial.map((h,i)=>(
                <div key={i} style={{marginBottom:8, border:"1.5px solid var(--border)", borderRadius:12, overflow:"hidden", background:"var(--surface)"}}>
                  {/* Header clickeable */}
                  <div className="hist-item" style={{cursor: h.tipo==="ok"?"pointer":"default", borderBottom: histExpanded===i?"1.5px solid var(--border)":"none"}}
                    onClick={()=>h.tipo==="ok" && setHistExpanded(histExpanded===i?null:i)}>
                    <div style={{flex:1}}>
                      <div className="hist-prov" style={{display:"flex",alignItems:"center",gap:6}}>
                        {h.tipo==="ok"&&<span style={{fontSize:11,color:"var(--muted)"}}>{histExpanded===i?"▼":"▶"}</span>}
                        {h.proveedor||h.archivo}
                      </div>
                      <div className="hist-meta">
                        {h.numero&&`Factura ${h.numero} · `}{h.fecha&&`${h.fecha} · `}{h.procesadoEl}
                        {h.tipo==="ok"&&` · ${h.productos} productos · ${fCOP(h.total)}`}
                        {h.tipo==="error"&&` · Error: ${h.error}`}
                      </div>
                    </div>
                    <div className="hist-badges" onClick={e=>e.stopPropagation()}>
                      {h.tipo==="ok"&&<span className="hbadge hbok">✓ Procesada</span>}
                      {h.tipo==="duplicado"&&<span className="hbadge hbdup">⚠ Duplicada</span>}
                      {h.tipo==="error"&&<span className="hbadge hberr">✗ Error</span>}
                      {h.tipo==="ok"&&h.data&&(
                        <>
                          <button className="bsm bout" style={{fontSize:10,padding:"4px 10px"}} onClick={()=>descargarCSV(h.data)}>⬇ Excel</button>
                          <button className="bsm bacc" style={{fontSize:10,padding:"4px 10px", background:"#1a7f4b"}} onClick={()=>copiarTP(h.data)}>🏪 TouchPay</button>
                          <button className="bsm bdanger" style={{fontSize:10,padding:"4px 10px"}} onClick={()=>borrarUno(h.numero,h.data?.nit_proveedor)}>🗑</button>
                        </>
                      )}
                    </div>
                  </div>
                  {/* Detalle expandido */}
                  {histExpanded===i && h.tipo==="ok" && h.data?.productos && (
                    <div style={{padding:"12px 16px", background:"var(--bg)"}}>
                      <table style={{width:"100%", borderCollapse:"collapse", fontSize:11, fontFamily:"DM Mono, monospace"}}>
                        <thead>
                          <tr style={{background:"var(--surface)", borderBottom:"2px solid var(--border)"}}>
                            <th style={{padding:"6px 8px", textAlign:"left", color:"var(--muted)"}}>Producto (Factura)</th>
                            <th style={{padding:"6px 8px", textAlign:"left", color:"var(--muted)"}}>Planograma TouchPay</th>
                            <th style={{padding:"6px 8px", textAlign:"center", color:"var(--muted)"}}>EAN</th>
                            <th style={{padding:"6px 8px", textAlign:"center", color:"var(--muted)"}}>Cant.</th>
                            <th style={{padding:"6px 8px", textAlign:"right", color:"var(--muted)"}}>Vr. Unit.</th>
                            <th style={{padding:"6px 8px", textAlign:"right", color:"var(--muted)"}}>Total</th>
                            <th style={{padding:"6px 8px", textAlign:"center", color:"var(--muted)"}}>Estado</th>
                          </tr>
                        </thead>
                        <tbody>
                          {h.data.productos.map((p,pi)=>(
                            <tr key={pi} style={{borderBottom:"1px solid var(--border)", background: p._pendiente_mapeo?"#fff8e1": p._es_combo?"#e8f5e9":"transparent"}}>
                              <td style={{padding:"5px 8px"}}>{p.nombre_completo||p.nombre_normalizado||p.descripcion}</td>
                              <td style={{padding:"5px 8px", color: p.planograma_touchpay?"var(--text)":"var(--muted)"}}>
                                {p.planograma_touchpay||"—"}
                              </td>
                              <td style={{padding:"5px 8px", textAlign:"center", color:"var(--muted)"}}>
                                {p.cod_barras_touchpay||"—"}
                              </td>
                              <td style={{padding:"5px 8px", textAlign:"center"}}>{p.cantidad_factura}</td>
                              <td style={{padding:"5px 8px", textAlign:"right"}}>{fCOP(p.valor_unitario_costo)}</td>
                              <td style={{padding:"5px 8px", textAlign:"right", fontWeight:600}}>{fCOP(p.valor_total_linea)}</td>
                              <td style={{padding:"5px 8px", textAlign:"center"}}>
                                {p._es_combo?<span style={{color:"#2e7d32",fontSize:10}}>🔀 Combo</span>:
                                 p._mapeado?<span style={{color:"#1a7f4b",fontSize:10}}>✓ OK</span>:
                                 <span style={{color:"#f59e0b",fontSize:10}}>⚠ Sin mapear</span>}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                        <tfoot>
                          <tr style={{borderTop:"2px solid var(--border)", background:"var(--surface)"}}>
                            <td colSpan={5} style={{padding:"6px 8px", textAlign:"right", fontWeight:700, fontSize:12}}>TOTAL FACTURA:</td>
                            <td style={{padding:"6px 8px", textAlign:"right", fontWeight:700, fontSize:12, color:"var(--green)"}}>{fCOP(h.data.total_factura)}</td>
                            <td/>
                          </tr>
                        </tfoot>
                      </table>
                    </div>
                  )}
                </div>
              ))
            )}
          </>}
        </div>
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
