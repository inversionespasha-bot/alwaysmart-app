  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}`, {
    headers: { Authorization: "Bearer " + token }
  });

const sheetsSet = async (token, range, values) => {
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`, {
    method: "PUT", headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },

  });
};
const sheetsAppend = async (token, range, values) => {
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`, {

const sheetsEnsureSheets = async (token) => {
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`, {
    headers: { Authorization: "Bearer " + token }
  });
  const data = await r.json();
  const existentes = (data.sheets || []).map(s => s.properties.title);
  const necesarias = ["Config", "Historial", "Costos", "Maestro_Nuevos"];
  const faltantes = necesarias.filter(n => !existentes.includes(n));
  if (faltantes.length > 0) {
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}:batchUpdate`, {
      method: "POST", headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },

function fCOP(n) {
  if (!n && n !== 0) return "$0";
  return "$" + Math.round(n).toLocaleString("es-CO");
}

async function loadPdfJs() {
  if (window.pdfjsLib) return window.pdfjsLib;
  await new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  return window.pdfjsLib;
}

async function extractText(file) {
  // Si es imagen, retornar null para usar análisis visual directo
  if (file.type.startsWith("image/") || file.name.match(/\.(jpg|jpeg|png)$/i)) {
    return null; // señal para usar imagen directamente
  }
  const pdfjs = await loadPdfJs();
  const pdf = await pdfjs.getDocument({ data: await file.arrayBuffer() }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const content = await (await pdf.getPage(i)).getTextContent();
    text += content.items.map((x) => x.str).join(" ") + "\n";
  }
  return text;
}

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function limpiarTexto(t) {
  return t.replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F]/g, " ")
    .replace(/\\/g, "/").replace(/"/g, "'").replace(/\t/g, " ").substring(0, 6000);
}

function limpiarNum(n) {
  if (!n) return n;
  const bloques = String(n).match(/\d+/g) || [];
  return bloques.length ? bloques[bloques.length - 1] : n;
}

  const prompt = `Eres un experto analizando remisiones y facturas físicas de proveedores colombianos.

Analiza la imagen e identifica primero qué proveedor es, luego aplica las reglas correspondientes:

== PROVEEDOR COLANTA (remisión manual de lácteos) ==
- Los productos están IMPRESOS con nombre y presentación en g/ml (ej: "LECHE COLANTA 1000" donde 1000=ml, NO es precio)
- Los números impresos al lado del producto son GRAMOS o ML de la presentación, NUNCA el precio
- CANTIDAD y PRECIO están escritos A MANO en las columnas M y A
- Primera columna manuscrita (M) = CANTIDAD de unidades compradas
- Segunda columna manuscrita (A) = PRECIO UNITARIO en pesos
- valor_unitario_costo = precio unitario manuscrito (columna A)
- cantidad_factura = cantidad manuscrita (columna M)

REGLA CRÍTICA PARA cantidad_por_conversion:

Sigue esta jerarquía estrictamente:

REGLA 1 — Columna explícita "CANT POR UNIDADES" o "UN/CAJA" en la factura (Coca-Cola, Pepsico, Bimbo):
  cantidad_por_conversion = valor de esa columna. Esta regla tiene prioridad sobre todo.

REGLA 2 — Asterisco seguido de número en el NOMBRE del producto (*N):
  Indica unidades por empaque SOLO si el número NO va seguido de una unidad de peso/volumen.
  - "*24" → conv=24 ✅ | "*6" → conv=6 ✅ | "*12" → conv=12 ✅
  - "*50 G", "*50G" → son gramos, conv=1 ❌ | "*625 ML", "*400M" → son mililitros, conv=1 ❌
  - "*90 GMS", "*40G", "*360 GMS" → son gramos, conv=1 ❌
  - Regla: si después del número hay G, GR, GMS, ML, KG, LT, CC → es peso/volumen, ignorar para conversión
  - EXCEPCIÓN: "LOS CUATES X269X24" → el X269 son ml y X24 es la referencia del sabor, conv=1
  - IMPORTANTE: El asterisco en columna POSICIÓN de Coca-Cola indica IVA, no conversión.

REGLA 3 — Unidad tipo P6, P12, P24 en la columna unidad:
  P6=6, P12=12, P24=24, P15=15.

REGLA 4 — Números entre paréntesis en el nombre como (48 DPLY),(24),(12):
  Son info del display del fabricante. NO son conversión. Ignorar siempre.

REGLA 5 — Por defecto: cantidad_por_conversion = 1

Ejemplos:
- "CERVEZA AGUILA *24" → conv=24
- "SNICKERS BARRA UNID(48 DPLY)" → conv=1 (paréntesis se ignora)
- "GALL TOSH MIEL*9(24)" → conv=9 (asterisco gana sobre paréntesis)
- Coca-Cola CJ con columna CANT POR UNIDADES=12 → conv=12 (columna gana sobre todo)

// Limpiar descripción de factura — quitar números internos de proveedores
function limpiarDescProveedor(desc, proveedor) {
  if (!desc) return '';
  let d = desc.trim().toUpperCase();
  // INSIFOOD: número largo pegado al texto + sufijo cantidad/precio
  d = d.replace(/^\d{5,}/, '').trim();
  d = d.replace(/\s+\d+[,\.]+\d*\s+(CJ|UN|PQT|BLS|BOT)\s+[\d,\.]+\s*$/i, '').trim();
  d = d.replace(/\s+\d+[,\.]+\d*\s+(CJ|UN|PQT|BLS|BOT)\s*$/i, '').trim();
  // ARA / LA FRESITA / LACTEOS ENVIGADO: "cantidad código NOMBRE"
  d = d.replace(/^\d+\s+\d{5,}\s+/, '').trim();
  // LACTEOS ENVIGADO: "cantidad código corto NOMBRE" + " X" al final
  d = d.replace(/^\d+\s+\d{2,5}\s+/, '').trim();
  d = d.replace(/\s+X\s*$/, '').trim();
  // CHIQUILLAS: "cantidad E-código NOMBRE"
  d = d.replace(/^\d+\s+[A-Z]?-?\d+\s+/, '').trim();
  // COCA COLA: "001 código NOMBRE 1 CJ"
  d = d.replace(/^\d{3}\s+\d{4,}\s+/, '').trim();
  d = d.replace(/\s+\d+\s+(CJ|BOT|UND|PQT)\s*$/i, '').trim();
  // Genérico: número largo al inicio
  d = d.replace(/^\d{5,}\s+/, '').trim();
  return d;
}

// Buscar producto en maestro por descripción (fuzzy matching)
function buscarEnMaestro(descFact, proveedor, nombreNormalizado) {
  // Priorizar nombre_normalizado si lo proveyó la IA
  const descLimpia = nombreNormalizado 
    ? nombreNormalizado.toUpperCase().trim()
    : limpiarDescProveedor(descFact, proveedor).toUpperCase();
  const desc = descLimpia;
  if (!desc || desc.length < 3) return null;
  
  // Normalizar: quitar espacios dobles, unificar mayúsculas
  const normalizar = s => s.toUpperCase().trim().replace(/\s+/g, ' ').replace(/([0-9]+)\s*(ml|g|gr|l|kg|cc)/gi, (_, n, u) => n + u.toLowerCase());

  const descNorm = normalizar(desc);

  // 1. Coincidencia exacta normalizada
  for (const p of MAESTRO_PRODUCTOS) {
    for (const alias of p.aliases) {
      if (normalizar(alias) === descNorm) return p;
    }
  }

  // 2. Contiene o está contenido
  for (const p of MAESTRO_PRODUCTOS) {
    for (const alias of p.aliases) {
      const a = normalizar(alias);
      if (descNorm.includes(a) || a.includes(descNorm)) return p;
    }
  }

  // 3. También buscar por planograma normalizado
  for (const p of MAESTRO_PRODUCTOS) {
    if (p.planograma && normalizar(p.planograma) === descNorm) return p;
    if (p.planograma && (descNorm.includes(normalizar(p.planograma)) || normalizar(p.planograma).includes(descNorm))) return p;
  }

  // 4. Fuzzy por palabras clave (>=60% en común)
  const palabrasDesc = descNorm.split(/\s+/).filter(w => w.length > 2);
  let mejorMatch = null;
  let mejorScore = 0;
  for (const p of MAESTRO_PRODUCTOS) {
    for (const alias of p.aliases) {
      const palabrasAlias = normalizar(alias).split(/\s+/).filter(w => w.length > 2);
      const comunes = palabrasDesc.filter(w => palabrasAlias.includes(w)).length;
      const score = comunes / Math.max(palabrasDesc.length, palabrasAlias.length);
      if (score > mejorScore && score >= 0.6) { mejorScore = score; mejorMatch = p; }
    }
  }
  return mejorMatch;
}

// Verificar si un producto es un combo y expandirlo
function expandirCombo(desc, cantidad, subtotal) {
  const d = desc.toUpperCase();
  for (const combo of COMBOS) {
    if (d.includes(combo.patron.toUpperCase())) {
      const totalUnidades = combo.unidades_por_paquete ? cantidad * combo.unidades_por_paquete : cantidad;
      return combo.productos.map(p => ({
        descripcion: p.planograma,
        cod_barras: p.cod_barras || '',
        cantidad_factura: Math.round(totalUnidades * p.fraccion) || 1,
        valor_unitario_costo: Math.round((subtotal * p.fraccion) / (Math.round(totalUnidades * p.fraccion) || 1)),
        valor_total_linea: Math.round(subtotal * p.fraccion),
        cantidad_por_conversion: 1,
        unidad_conversion: 'Unidad',
        _es_combo: true
      }));
    }
  }
  return null;
}

// Enriquecer productos con datos del maestro
function enriquecerConMaestro(productos, proveedorRaw, addLog) {
  const proveedor = normalizarProveedor(proveedorRaw);
  const resultado = [];
  const pendientesNuevos = [];
  
  for (const prod of productos) {
    // Verificar si es combo
    const expandido = expandirCombo(prod.descripcion, prod.cantidad_factura || 1, prod.valor_total_linea || 0);
    if (expandido) {
      addLog(`→ 🔀 Combo expandido: "${prod.descripcion}" → ${expandido.length} productos`, "linf");
      resultado.push(...expandido);
      continue;
    }
    
    // Construir nombre completo: nombre_normalizado + presentacion
    if (prod.nombre_normalizado) {
      prod.nombre_completo = prod.presentacion 
        ? `${prod.nombre_normalizado} ${prod.presentacion}`.trim()
        : prod.nombre_normalizado;
    }
    // Buscar en maestro — usar nombre_completo si la IA lo extrajo
    const match = buscarEnMaestro(prod.descripcion, proveedor, prod.nombre_completo || prod.nombre_normalizado);
    if (match) {
      prod.cod_barras_touchpay = match.cod_barras;
      prod.planograma_touchpay = match.planograma;
      prod._mapeado = true;
      // Prioridad de conversión:
      // 1. La que ya viene en prod.cantidad_por_conversion (extraída por IA del asterisco)
      // 2. La unidad_medida P6/P12/P15 (para Mega Mayorista)
      // 3. La del maestro como fallback
      const convIA = prod.cantidad_por_conversion || 1;
      const um = (prod.unidad_medida || '').toUpperCase().trim();
      const convMap = {'P6':6,'P12':12,'P15':15,'P24':24,'P4':4,'P8':8,'P10':10,'P18':18,'P20':20};
      const convUM = convMap[um] || 0;
      const convFinal = convUM > 1 ? convUM : (convIA > 1 ? convIA : match.cant_conv);
      prod.cantidad_por_conversion = convFinal;
      prod.unidad_conversion = convFinal > 1 ? 'Caja' : match.unidad_conv;
    } else {
      prod._pendiente_mapeo = true;
      pendientesNuevos.push({ descripcion: prod.descripcion, proveedor });
      const nombreDisplay = prod.nombre_completo || prod.nombre_normalizado || prod.descripcion;
      addLog(`→ ⚠️ Sin mapear: "${nombreDisplay}" — agregar al maestro`, "lwarn");
    }
    resultado.push(prod);
  }
  
  // Guardar productos nuevos sin mapear
  if (pendientesNuevos.length > 0) {
    const sinMapear = load("as_sin_mapear", []);
    for (const p of pendientesNuevos) {
      if (!sinMapear.find(x => x.descripcion === p.descripcion && x.proveedor === p.proveedor)) {
        sinMapear.push({ ...p, fecha: new Date().toLocaleString("es-CO") });
      }
    }
    save("as_sin_mapear", sinMapear);
  }
  
  return resultado;
}

async function analizarConIA(texto, archivo, onLog, file=null, apiKey='') {
  let lastErr = null;
  for (let i = 1; i <= MAX_INTENTOS; i++) {
    try {
      if (i > 1) { onLog(`→ Reintento ${i}/${MAX_INTENTOS}...`, "warn"); await new Promise(r => setTimeout(r, 1500 * i)); }
      let p;
      if (texto === null && file) {
        // Es imagen — usar análisis visual
        onLog(`→ Analizando imagen con visión IA...`, "linf");
        const base64 = await fileToBase64(file);
        const mediaType = file.type || "image/jpeg";
        p = await llamarAPIImagen(base64, mediaType, apiKey);
      } else {
        p = await llamarAPI(limpiarTexto(texto), apiKey);
      }
      p.numero_factura = limpiarNum(p.numero_factura);
      p._inventario = INVENTARIO;
      p._clave_acceso = p.numero_factura;
      p._archivo = archivo;
      p._intentos = i;
      p._procesadoEl = new Date().toLocaleString("es-CO");
      return p;
    } catch (err) { lastErr = err; onLog(`→ Intento ${i} falló: ${err.message}`, "warn"); }
  }
  throw new Error(`${MAX_INTENTOS} intentos fallidos: ${lastErr.message}`);
}

function detectarDup(texto) {
  if (!texto) return null;
  // Normalizar texto: quitar comas de números (36,070 → 36070) para comparar
  const textoNorm = texto.replace(/([0-9]),([0-9])/g, "$1$2");
  const procesados = load("as_procesados", {});
  for (const key of Object.keys(procesados)) {
    const entry = procesados[key];
    const num = (entry.numero || "").toString().trim().replace(/,/g, "");
    if (!num || num.length < 4) continue;
    // Buscar en texto normalizado, rodeado de no-dígitos
    const idx = textoNorm.indexOf(num);
    if (idx === -1) continue;
    const antes = idx === 0 ? " " : textoNorm[idx - 1];
    const despues = idx + num.length >= textoNorm.length ? " " : textoNorm[idx + num.length];
    const esDigito = c => c >= "0" && c <= "9";
    if (!esDigito(antes) && !esDigito(despues)) return entry;
  }
  return null;
}

function registrarProcesado(f) {
  const todos = load("as_procesados", {});
  const num = (f.numero_factura || "").toString().trim();
  const nit = (f.nit_proveedor || "").toString().trim();
  if (!num) return;
  // Guardar por número solo Y por nit+numero para mayor cobertura
  todos[`num_${num}`] = { proveedor: f.proveedor, numero: num, fecha: f.fecha_emision, procesadoEl: f._procesadoEl };
  if (nit) todos[`${nit}_${num}`] = { proveedor: f.proveedor, numero: num, fecha: f.fecha_emision, procesadoEl: f._procesadoEl };
  save("as_procesados", todos);
}

  const procesarPedidosDatos = (invRows, venRows) => {
    const cleanEan = v => { try { let s=String(v).trim().replace('.0',''); if(s.includes('E')||s.includes('e')) s=String(parseInt(parseFloat(s))); return s; } catch(e) { return String(v).trim(); }};
    const PDV_MAP = {
      'PDV 1651 - CERATTO APARTAMENTOS - MEDELLIN': 'Ceratto',
      'PDV 2311 - MANZANAL  - ENVIGADO': 'Manzanal',
      'PDV 2313 - CURUBAL - ENVIGADO': 'Curubal',
    };
    // Build inventory maps
    const cantMap = {}, niMap = {}, mcMap = {}, stockMap = {};
    invRows.forEach(r => {
      const ean = cleanEan(r['Código de barras'] || r['Codigo de barras'] || '');
      if (!ean) return;
      const pdv = PDV_MAP[r['PDV asociado']];
      const cant = parseFloat(r['Cantidad'] || 0);
      const ni = parseFloat(r['Quantidade desejada'] || 0);
      const mc = parseFloat(r['Mínimo crítico'] || r['Minimo critico'] || 0);
      if (!pdv) { stockMap[ean] = (stockMap[ean]||0) + cant; }
      else {
        if (!cantMap[ean]) cantMap[ean] = {};
        if (!niMap[ean]) niMap[ean] = {};
        if (!mcMap[ean]) mcMap[ean] = {};
        cantMap[ean][pdv] = (cantMap[ean][pdv]||0) + cant;
        niMap[ean][pdv] = ni;
        mcMap[ean][pdv] = mc;
      }
    });
    // Build ventas map
    const ventasMap = {};
    venRows.forEach(r => {
      const ean = cleanEan(r['Cód. barras '] || r['Código Producto'] || r['Cod. barras'] || '');
      if (!ean) return;
      ventasMap[ean] = { ventas: parseFloat(r['Saídas/Vendas'] || r['Cantidad'] || 0), costo: parseFloat(r['Última Compra (Custo)'] || r['Ultimo Costo'] || 0), desc: r['Descripción'] || r['Descripcion del producto'] || '' };
    });
    // Build maestro lookup
    const maestroMap = {};
    MAESTRO_PRODUCTOS.forEach(p => { maestroMap[p.cod_barras] = p; });
    // Calculate pedido per EAN
    const pdvs = ['Ceratto','Manzanal','Curubal'];
    const pedidosPorProv = {};
    const allEans = new Set([...Object.keys(cantMap), ...Object.keys(venRows.map(r => cleanEan(r['Cód. barras '] || r['Código Producto'] || '')).filter(Boolean))]);
    venRows.forEach(r => {
      const ean = cleanEan(r['Cód. barras '] || r['Código Producto'] || '');
      if (!ean || !cantMap[ean]) return;
      const vd = (ventasMap[ean]?.ventas || 0) / 16;
      const stock = stockMap[ean] || 0;
      let nec = false;
      pdvs.forEach(pdv => {
        if (cantMap[ean]?.[pdv] === undefined) return;
        const cant = cantMap[ean][pdv] || 0;
        const mc = mcMap[ean]?.[pdv] ?? 0;
        if (cant <= mc) nec = true;
      });
      if (!nec) return;
      let falt = 0;
      pdvs.forEach(pdv => {
        if (cantMap[ean]?.[pdv] === undefined) return;
        const ni = niMap[ean]?.[pdv] || 0;
        const cant = cantMap[ean][pdv] || 0;
        falt += Math.max(0, ni - cant);
      });
      const pedir = Math.floor(Math.max(0, falt - stock + Math.round(vd * 4)));
      if (pedir <= 0) return;
      const m = maestroMap[ean];
      const prov = m?.proveedor || r['Nombre del Proveedor'] || 'OTROS';
      const descProv = m?.desc_factura || ventasMap[ean]?.desc || '';
      const pres = m?.unidad_conv || 'Unidad';
      const uniPres = m?.cant_conv || 1;
      const pedidoFinal = pres.toLowerCase() === 'unidad' || uniPres <= 1 ? pedir : Math.ceil(pedir / uniPres);
      if (!pedidosPorProv[prov]) pedidosPorProv[prov] = [];
      pedidosPorProv[prov].push({ ean, desc: descProv, pres: pres.toUpperCase(), pedido: pedidoFinal, costo: ventasMap[ean]?.costo || 0 });
    });
    // Sort
    Object.keys(pedidosPorProv).forEach(p => pedidosPorProv[p].sort((a,b) => a.desc.localeCompare(b.desc)));
    return { proveedores: pedidosPorProv, fecha: new Date().toLocaleDateString('es-CO') };
  };

FACTURA: ${f.numero_factura} | FECHA: ${fechaISO ? fechaISO.substring(0,7)+"-"+parseInt(fechaISO.substring(8,10)) : f.fecha_emision} | INVENTARIO: ${INVENTARIO}

PASOS:

3. Por cada producto: EAN → precio → cantidad → conv=1 → AGREGAR OTRO (último: AGREGAR Y FINALIZAR)
4. Confirmar y guardar

PRODUCTOS (EAN|precio|cantidad):

                            <th>Cant/conv.</th>
                            <th style={{color:"var(--green)"}}>Unidades recibidas</th>
                            <th style={{color:"var(--green)"}}>Valor x unidad</th>
                            <th>Valor total</th>

                            const esCorreccion = correcciones[key] || false;

                            // Unidades totales recibidas = cantidad × conversion
                            const unidadesRecibidas = Math.round(cantReal * p.cantidad_por_conversion * 100) / 100;

                            // Valor por unidad:
                            // - Si es corrección → mantener valor unitario original (el precio no cambia)
                            // - Si es promo → recalcular (más unidades por el mismo precio total)
                            const valorXUnidad = esCorreccion
                              ? p.valor_unitario_costo
                              : (unidadesRecibidas > 0 ? p.valor_total_linea / unidadesRecibidas : p.valor_unitario_costo);

                                <td className="tmono" style={{textAlign:"center"}}>{p.cantidad_por_conversion}</td>

                                <td>

                    🚀 Subir {seleccionadas.size} factura{seleccionadas.size>1?"s":""} a TouchPay
                  </button>
                )}
                {seleccionadas.size > 0 && (
                  <button className="bsm bout" style={{fontSize:11}} onClick={()=>setSeleccionadas(new Set())}>
                    ✕ Deseleccionar
                  </button>
                )}
                {historial.length>0&&<button className={`btn-sm-outline${confirmBorrar?" bdanger":""}`} onClick={borrarHistorial}>{confirmBorrar?"⚠ Confirmar":"🗑 Borrar todo"}</button>}
              </div>
            </div>

            {historial.length>0&&(
              <div className="stats-row">
                <div className="stat"><div className="stat-num">{histOk}</div><div className="stat-label">Procesadas correctamente</div></div>
                <div className="stat"><div className="stat-num" style={{color:"#f5c842"}}>{histDup}</div><div className="stat-label">Duplicadas bloqueadas</div></div>
                <div className="stat"><div className="stat-num" style={{color:"#ff5566"}}>{histErr}</div><div className="stat-label">Con error</div></div>
              </div>
            )}

            {historial.length===0?(
              <div className="empty">
                <div className="empty-icon">📋</div>
                <div>Aún no hay facturas procesadas</div>
              </div>
            ):(
              historial.map((h,i)=>(
                <div key={i} style={{marginBottom:8, border:`1.5px solid ${h.estado_tp==="ingresada"?"#c8e6d0":h.estado_tp==="en_proceso"?"#bfdbfe":"var(--border)"}`, borderRadius:12, overflow:"hidden", background:h.estado_tp==="ingresada"?"#f0fdf4":h.estado_tp==="en_proceso"?"#eff6ff":"var(--surface)", opacity:h.estado_tp==="ingresada"?0.7:1}}>
                  {/* Header clickeable */}
                  <div className="hist-item" style={{cursor: h.tipo==="ok"?"pointer":"default", borderBottom: histExpanded===i?"1.5px solid var(--border)":"none"}}
                    onClick={()=>h.tipo==="ok" && setHistExpanded(histExpanded===i?null:i)}>
                    {h.tipo==="ok" && h.estado_tp !== "ingresada" && !h.data?.productos?.some(p=>p._pendiente_mapeo) && (
                      <input type="checkbox" checked={seleccionadas.has(i)}
                        onClick={e=>e.stopPropagation()}
                        onChange={e=>{ const s=new Set(seleccionadas); e.target.checked?s.add(i):s.delete(i); setSeleccionadas(s); }}
                        style={{marginRight:8,width:16,height:16,cursor:"pointer",accentColor:"var(--green)",flexShrink:0}}
                      />
                    )}
                    <div style={{flex:1}}>
                      <div className="hist-prov" style={{display:"flex",alignItems:"center",gap:6}}>
                        {h.tipo==="ok"&&<span style={{fontSize:11,color:"var(--muted)"}}>{histExpanded===i?"▼":"▶"}</span>}
                        {h.proveedor||h.archivo}
                      </div>
                      <div className="hist-meta">
                        {h.numero&&`Factura ${h.numero} · `}{h.fecha&&`${h.fecha} · `}{h.procesadoEl}
                        {h.tipo==="ok"&&` · ${h.productos} productos · ${fCOP(h.total)}`}
                        {h.tipo==="error"&&` · Error: ${h.error}`}
                      </div>
                    </div>
                    <div className="hist-badges" onClick={e=>e.stopPropagation()}>
                      {h.tipo==="ok"&&(
                        h.estado_tp==="ingresada"
                          ? <span className="hbadge" style={{background:"#dcfce7",color:"#166534",border:"1px solid #86efac"}}>✅ Ingresada</span>
                          : h.estado_tp==="en_proceso"
                          ? <span className="hbadge" style={{background:"#dbeafe",color:"#1e40af",border:"1px solid #93c5fd"}}>⏳ En proceso</span>
                          : <span className="hbadge" style={{background:"#fff3cd",color:"#856404",border:"1px solid #f59e0b",fontWeight:700}}>⏸ Pendiente TouchPay</span>
                      )}
                      {h.tipo==="duplicado"&&<span className="hbadge hbdup">⚠ Duplicada</span>}
                      {h.tipo==="error"&&<span className="hbadge hberr">✗ Error</span>}
                      {h.tipo==="ok"&&h.alertas_precio?.length>0&&(
                        <div style={{margin:"8px 0 4px",padding:"12px 16px",background:"#fffbeb",border:"1.5px solid #f59e0b",borderRadius:10}}>
                          <div style={{fontFamily:"Nunito,sans-serif",fontWeight:800,fontSize:13,color:"#b45309",marginBottom:8}}>
                            📈 {h.alertas_precio.length} producto{h.alertas_precio.length>1?"s":""} con aumento de costo &gt;3% — revisar precios de venta
                          </div>
                          <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"DM Mono,monospace",fontSize:11}}>
                            <thead>
                              <tr style={{color:"var(--muted)",borderBottom:"1px solid #f59e0b"}}>
                                <td style={{padding:"3px 8px 6px 0",fontWeight:700}}>Producto</td>
                                <td style={{padding:"3px 8px 6px",textAlign:"right",fontWeight:700}}>Costo anterior</td>
                                <td style={{padding:"3px 8px 6px",textAlign:"right",fontWeight:700}}>Costo nuevo</td>
                                <td style={{padding:"3px 0 6px",textAlign:"right",fontWeight:700}}>Variación</td>
                              </tr>
                            </thead>
                            <tbody>
                              {h.alertas_precio.map((a,ai)=>(
                                <tr key={ai} style={{borderBottom:"1px solid #fde68a"}}>
                                  <td style={{padding:"5px 8px 5px 0",color:"var(--text)",fontWeight:600}}>{a.nombre}</td>
                                  <td style={{padding:"5px 8px",textAlign:"right",color:"var(--muted)"}}>${a.costo_anterior.toLocaleString("es-CO")}</td>
                                  <td style={{padding:"5px 8px",textAlign:"right",color:"var(--text)",fontWeight:700}}>${a.costo_nuevo.toLocaleString("es-CO")}</td>
                                  <td style={{padding:"5px 0",textAlign:"right",color: a.variacion>10?"#dc2626":"#d97706",fontWeight:800}}>+{a.variacion}% {a.variacion>10?"🔴":"🟡"}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      )}
                      {h.tipo==="ok"&&h.data&&(
                        <>
                          {h.data.productos?.some(p=>p._pendiente_mapeo) && (
                            <span className="hbadge" style={{background:"#fff3cd",color:"#856404",border:"1px solid #ffc107",cursor:"pointer"}}
                              onClick={()=>{ setMapeoModal({histIdx:i, prods: h.data.productos.filter(p=>p._pendiente_mapeo), nombre: h.proveedor}); setMapeoEans({}); }}>
                              ⚠️ {h.data.productos.filter(p=>p._pendiente_mapeo).length} sin mapear
                            </span>
                          )}
                          <button className="bsm bout" style={{fontSize:10,padding:"4px 10px"}} onClick={()=>descargarCSV(h.data)}>⬇ Excel</button>
                          {h.estado_tp==="ingresada" ? null
                          : h.estado_tp==="en_proceso" ? (
                            <button className="bsm bacc" style={{fontSize:10,padding:"4px 10px"}} onClick={()=>marcarIngresada(i)}>✅ Marcar ingresada</button>
                          ) : (
                            <button className="bsm btp" style={{fontSize:10,padding:"4px 10px",opacity:h.data.productos?.some(p=>p._pendiente_mapeo)?0.4:1}} 
                              onClick={()=>{ if(!h.data.productos?.some(p=>p._pendiente_mapeo)) setTpModal(h.data); else alert("Primero mapea los productos sin EAN ⚠️"); }}>🤖 Auto</button>
                          )}
                          <button className="bsm bdanger" style={{fontSize:10,padding:"4px 10px"}} onClick={()=>borrarUno(h.numero,h.data?.nit_proveedor)}>🗑</button>
                        </>
                      )}
                    </div>
                  </div>
                  {/* Detalle expandido */}
                  {histExpanded===i && h.tipo==="ok" && h.data?.productos && (
                    <div style={{padding:"12px 16px", background:"var(--bg)"}}>
                      <table style={{width:"100%", borderCollapse:"collapse", fontSize:11, fontFamily:"DM Mono, monospace"}}>
                        <thead>
                          <tr style={{background:"var(--surface)", borderBottom:"2px solid var(--border)"}}>
                            <th style={{padding:"6px 8px", textAlign:"left", color:"var(--muted)"}}>Producto (Factura)</th>
                            <th style={{padding:"6px 8px", textAlign:"left", color:"var(--muted)"}}>Planograma TouchPay</th>
                            <th style={{padding:"6px 8px", textAlign:"center", color:"var(--muted)"}}>EAN</th>
                            <th style={{padding:"6px 8px", textAlign:"center", color:"var(--muted)"}}>Cant.</th>
                            <th style={{padding:"6px 8px", textAlign:"center", color:"var(--muted)"}}>Conv.</th>
                            <th style={{padding:"6px 8px", textAlign:"center", color:"var(--green)", fontWeight:700}}>Unid. Recibidas</th>
                            <th style={{padding:"6px 8px", textAlign:"right", color:"var(--muted)"}}>Vr. Unit.</th>
                            <th style={{padding:"6px 8px", textAlign:"right", color:"var(--muted)"}}>Total</th>
                            <th style={{padding:"6px 8px", textAlign:"center", color:"var(--muted)"}}>Estado</th>
                          </tr>
                        </thead>
                        <tbody>
                          {h.data.productos.map((p,pi)=>(
                            <tr key={pi} style={{borderBottom:"1px solid var(--border)", background: p._pendiente_mapeo?"#fff8e1": p._es_combo?"#e8f5e9":"transparent"}}>
                              <td style={{padding:"5px 8px"}}>{p.nombre_completo||p.nombre_normalizado||p.descripcion}</td>
                              <td style={{padding:"5px 8px", color: p.planograma_touchpay?"var(--text)":"var(--muted)"}}>
                                {p.planograma_touchpay||"—"}
                              </td>
                              <td style={{padding:"5px 8px", textAlign:"center", color:"var(--muted)"}}>
                                {p.cod_barras_touchpay||"—"}
                              </td>
                              <td style={{padding:"5px 8px", textAlign:"center"}}>
                                <input type="number" min="0" step="0.1"
                                  value={p.cantidad_factura}
                                  onChange={e => {
                                    const val = parseFloat(e.target.value) || 0;
                                    const hist = [...historial];
                                    const hIdx = hist.findIndex(x => x.numero === h.numero && x.tipo === "ok");
                                    if (hIdx >= 0) {
                                      const prods = [...hist[hIdx].data.productos];
                                      prods[pi] = {...prods[pi], cantidad_factura: val};
                                      hist[hIdx] = {...hist[hIdx], data: {...hist[hIdx].data, productos: prods}};
                                      save("as_historial", hist);
                                      setHistorial(hist);
                                    }
                                  }}
                                  style={{width:52, textAlign:"center", fontFamily:"DM Mono,monospace", fontSize:12, padding:"2px 4px", borderRadius:4, border:"1.5px solid var(--border)", background:"var(--bg)", color:"var(--text)"}}
                                />
                              </td>
                              <td style={{padding:"5px 8px", textAlign:"center", color:"var(--muted)", fontSize:10}}>
                                {p.cantidad_por_conversion > 1 ? `x${p.cantidad_por_conversion}` : "—"}
                              </td>
                              <td style={{padding:"5px 8px", textAlign:"center", fontWeight:700, color:"var(--green)"}}>
                                {Math.round((p.cantidad_factura||1) * (p.cantidad_por_conversion||1))}
                              </td>
                              <td style={{padding:"5px 8px", textAlign:"right"}}>
                                <input type="number" min="0"
                                  value={p.valor_unitario_costo}
                                  onChange={e => {
                                    const val = parseInt(e.target.value) || 0;
                                    const hist = [...historial];
                                    const hIdx = hist.findIndex(x => x.numero === h.numero && x.tipo === "ok");
                                    if (hIdx >= 0) {
                                      const prods = [...hist[hIdx].data.productos];
                                      prods[pi] = {...prods[pi], valor_unitario_costo: val, _precio_modificado: true};
                                      hist[hIdx] = {...hist[hIdx], data: {...hist[hIdx].data, productos: prods}};
                                      save("as_historial", hist);
                                      setHistorial(hist);
                                    }
                                  }}
                                  style={{width:72, textAlign:"right", fontFamily:"DM Mono,monospace", fontSize:12, padding:"2px 4px", borderRadius:4, border:"1.5px solid var(--border)", background:"var(--bg)", color:"var(--text)"}}
                                />
                              </td>
                              <td style={{padding:"5px 8px", textAlign:"right", fontWeight:600}}>{fCOP(Math.round(p.valor_unitario_costo * p.cantidad_factura * (p.cantidad_por_conversion||1)))}</td>
                              <td style={{padding:"5px 8px", textAlign:"center"}}>
                                {p._es_combo?<span style={{color:"#2e7d32",fontSize:10}}>🔀 Combo</span>:
                                 p._mapeado?<span style={{color:"#1a7f4b",fontSize:10}}>✓ OK</span>:
                                 <span style={{color:"#f59e0b",fontSize:10}}>⚠ Sin mapear</span>}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                        <tfoot>
                          <tr style={{borderTop:"2px solid var(--border)", background:"var(--surface)"}}>
                            <td colSpan={5} style={{padding:"6px 8px", textAlign:"right", fontWeight:700, fontSize:12}}>TOTAL FACTURA:</td>
                            <td style={{padding:"6px 8px", textAlign:"right", fontWeight:700, fontSize:12, color:"var(--green)"}}>{fCOP(h.data.total_factura)}</td>
                            <td/>
                          </tr>
                        </tfoot>
                      </table>
                    </div>
                  )}
                </div>
              ))
            )}
          </>}
        </div>
      </div>

      {/* MODAL SCRIPT MÚLTIPLE */}
      {multiModal && (
        <div className="tp-modal" onClick={e=>{ if(e.target.className==="tp-modal") setMultiModal(false); }}>
          <div className="tp-modal-box" style={{maxWidth:520}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <div>
                <div className="tp-modal-title">🚀 Subir {seleccionadas.size} facturas a TouchPay</div>
                <div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"var(--muted)"}}>Se generará un script único — el bot las ingresa una por una</div>
              </div>
              <button className="bsm bout" onClick={()=>setMultiModal(false)}>✕</button>
            </div>
            <div style={{marginBottom:16}}>
              {[...seleccionadas].map(i=>historial[i]).filter(Boolean).map((h,idx)=>(
                <div key={idx} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",marginBottom:6,borderRadius:8,background:"var(--bg2)",border:"1px solid var(--border)"}}>
                  <span style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"var(--muted)",minWidth:20}}>{idx+1}.</span>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"Nunito,sans-serif",fontWeight:700,fontSize:13}}>{h.proveedor}</div>
                    <div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"var(--muted)"}}>Factura {h.numero} · {h.productos} productos · {fCOP(h.total)}</div>
                  </div>
                </div>
              ))}
            </div>
            <button className="btn-main" style={{width:"100%",padding:"12px",fontSize:14}} onClick={generarScriptMultiple}>
              📋 Copiar script y abrir TouchPay
            </button>
            <div style={{marginTop:10,fontFamily:"DM Mono,monospace",fontSize:11,color:"var(--muted)",textAlign:"center"}}>
              Después de pegar en Claude in Chrome, marca cada factura como ✅ Ingresada
            </div>
          </div>
        </div>
      )}

      {/* MODAL MAPEO PRODUCTOS */}
      {mapeoModal && (
        <div className="tp-modal" onClick={(e)=>{ if(e.target.className==="tp-modal") setMapeoModal(null); }}>
          <div className="tp-modal-box" style={{maxWidth:560}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <div>
                <div className="tp-modal-title">⚠️ Productos sin mapear</div>
                <div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"var(--muted)"}}>{mapeoModal.nombre} — ingresa el EAN de cada producto</div>
              </div>
              <button className="bsm bout" onClick={()=>setMapeoModal(null)}>✕ Cerrar</button>
            </div>
            {mapeoModal.prods.map((p,pi)=>(
              <div key={pi} style={{marginBottom:12,padding:"10px 14px",background:"var(--bg2)",borderRadius:8,border:"1.5px solid #ffc107"}}>
                <div style={{fontFamily:"Nunito,sans-serif",fontWeight:700,fontSize:13,marginBottom:6,color:"var(--text)"}}>
                  {p.nombre_completo||p.nombre_normalizado||p.descripcion}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"var(--muted)",whiteSpace:"nowrap"}}>EAN / Código de barras:</span>
                  <input
                    type="text" placeholder="Ej: 7702189045720"
                    value={mapeoEans[p.descripcion]||""}
                    onChange={e=>setMapeoEans(prev=>({...prev,[p.descripcion]:e.target.value}))}
                    style={{flex:1,fontFamily:"DM Mono,monospace",fontSize:12,padding:"5px 8px",borderRadius:6,border:"1.5px solid var(--border)",background:"var(--bg)",color:"var(--text)"}}
                  />
                </div>
              </div>
            ))}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
              <button className="bsm bout" onClick={()=>setMapeoModal(null)}>Cancelar</button>
              <button className="btn-main" style={{padding:"8px 20px",fontSize:13}} onClick={guardarMapeoYReprocesar}
                disabled={mapeoModal.prods.some(p=>!(mapeoEans[p.descripcion]?.trim()))}>
                ✓ Guardar y actualizar factura
              </button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL AUTOMATIZACIÓN TOUCHPAY */}
      {tpModal && (() => {
        const { script, lineas, productosSinMapear } = generarScriptTP(tpModal, cantidadesReales, correcciones);
        return (
          <div className="tp-modal" onClick={(e)=>{ if(e.target.className==="tp-modal") setTpModal(null); }}>
            <div className="tp-modal-box">
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:4}}>
                <div>
                  <div className="tp-modal-title">🤖 Automatizar en TouchPay</div>
                  <div className="tp-modal-sub">{tpModal.proveedor} · Factura {tpModal.numero_factura} · {lineas.length} productos mapeados</div>
                </div>
                <button onClick={()=>setTpModal(null)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--muted)",lineHeight:1}}>✕</button>
              </div>

              {productosSinMapear.length > 0 && (
                <div className="tp-warn">
                  ⚠️ <b>{productosSinMapear.length} producto(s) sin EAN</b> no se pueden automatizar: {productosSinMapear.map(p=>p.descripcion).join(", ")}. Agrégalos manualmente en TouchPay.
                </div>
              )}

              <ol className="tp-step-list">
                <li><div className="tp-step-num">1</div><div>Abre <b>touchpay.market</b> en Chrome y ve a <b>Compras</b>.</div></li>
                <li><div className="tp-step-num">2</div><div>Haz clic en el ícono de <b>Claude in Chrome</b> en la barra lateral del navegador para abrir el chat.</div></li>
                <li><div className="tp-step-num">3</div><div>Copia el script de abajo y pégalo en el chat de Claude. Él abre el formulario, llena todos los campos y agrega cada producto automáticamente.</div></li>
                <li><div className="tp-step-num">4</div><div>Supervisa el proceso — Claude te avisará si algún producto no se encuentra por EAN.</div></li>
              </ol>

              <div style={{fontFamily:"Nunito,sans-serif",fontWeight:700,fontSize:12,color:"var(--muted)",marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Script listo para Claude in Chrome:</div>
              <div className="tp-script-box">{script}</div>

              {/* Botón principal RUN */}
              <button className="btn-main" style={{width:"100%",marginBottom:10,fontSize:14,padding:"12px"}}
                onClick={()=>lanzarEnTouchPay(tpModal)}>
                🚀 Copiar script y abrir TouchPay
              </button>

              {scriptCopiado && (
                <div style={{padding:"12px 16px",background:"#e8f5e9",border:"1.5px solid #4caf50",borderRadius:10,marginBottom:10}}>
                  <div style={{fontFamily:"Nunito,sans-serif",fontWeight:800,fontSize:13,color:"#1a7f4b",marginBottom:6}}>
                    ✅ Script copiado — TouchPay abierto
                  </div>
                  <div style={{fontFamily:"DM Mono,monospace",fontSize:12,color:"var(--text)",lineHeight:1.6}}>
                    Ahora en la pestaña de TouchPay:<br/>
                    1. Haz clic en el ícono de <b>Claude</b> 🤖 en la barra del navegador<br/>
                    2. Escribe <b>/Ingresar-Factura-Pasha</b> y presiona Enter<br/>
                    3. El bot hace todo el resto solo ✓
                  </div>
                </div>
              )}

              <div className="tp-actions">
                <button className="bsm btp" onClick={()=>copiarScriptTP(tpModal)}>📋 Solo copiar script</button>
                <button className="bsm bdanger" onClick={()=>setTpModal(null)}>✕ Cerrar</button>
              </div>

              <div style={{marginTop:10,padding:"8px 14px",background:"var(--green-light)",borderRadius:8,fontSize:11,fontFamily:"DM Mono,monospace",color:"var(--green)"}}>
                ✓ Factura <b>{tpModal.numero_factura}</b> · {lineas.length} productos · inventario <b>{INVENTARIO}</b>
              </div>
            </div>
          </div>
        );
      })()}
    </>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
